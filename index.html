<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>探索型 OSM ナビ</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

/* ハンバーガー */
#menuButton{
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;

    width:55px;
    height:55px;

    border:none;
    border-radius:16px;

    background:rgba(20,20,20,0.9);
    color:white;

    font-size:28px;

    backdrop-filter:blur(10px);

    cursor:pointer;
}

/* サイドバー */
#sidebar{

    position:absolute;
    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.96);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;

    backdrop-filter:blur(10px);
}

#sidebar.open{
    left:0;
}

.title{
    margin-top:20px;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    font-size:16px;

    box-sizing:border-box;
}

button.action{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.7);

    color:white;

    padding:10px 14px;

    border-radius:12px;
}

#mappingModeIndicator{

    position:absolute;

    top:15px;
    right:15px;

    z-index:1000;

    background:rgba(0,0,0,0.7);

    color:#00ff99;

    padding:10px 14px;

    border-radius:12px;

    display:none;
}

</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">目的地検索</div>

    <input
        type="text"
        id="destinationInput"
        placeholder="目的地を入力"
    >

    <button class="action" id="searchButton">
        ルート検索
    </button>

    <button class="action" id="clearRouteButton">
        目的地＆ルート消去
    </button>

    <button class="action" id="manualSelectButton">
        地図タップで目的地選択
    </button>

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <div class="title">探索マップ</div>

    <button class="action" id="mappingButton">
        未探索エリア黒塗り ON/OFF
    </button>

    <div class="title">3D</div>

    <button class="action" id="toggle3d">
        3D建物 ON/OFF
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<div id="mappingModeIndicator">
探索モード ON
</div>

<script>

//////////////////////////////////////////////////////
// 地図
//////////////////////////////////////////////////////

const map = new maplibregl.Map({

    container:'map',

    style:{
        version:8,

        sources:{
            osm:{
                type:'raster',
                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],
                tileSize:256,
                attribution:'© OpenStreetMap'
            }
        },

        layers:[
            {
                id:'osm',
                type:'raster',
                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],
    zoom:16,
    pitch:45
});

//////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////

const sidebar =
document.getElementById('sidebar');

document.getElementById('menuButton')
.onclick=()=>{

    sidebar.classList.toggle('open');
};

//////////////////////////////////////////////////////
// GPS
//////////////////////////////////////////////////////

let currentPosition=null;

const userMarker=
new maplibregl.Marker({
    color:'#00aaff'
});

function gpsSuccess(pos){

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    currentPosition=[lng,lat];

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    document.getElementById('gpsInfo')
    .innerText=
    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    if(autoCenter){

        map.flyTo({
            center:currentPosition,
            zoom:17,
            speed:1.2
        });

        autoCenter=false;
    }

    //////////////////////////////////////////////////////
    // 探索済み追加
    //////////////////////////////////////////////////////

    exploredCoordinates.push([lng,lat]);

    if(map.getSource('explored')){

        map.getSource('explored')
        .setData({
            type:'Feature',
            geometry:{
                type:'LineString',
                coordinates:exploredCoordinates
            }
        });
    }
}

navigator.geolocation.watchPosition(
    gpsSuccess,
    err=>console.log(err),
    {
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:10000
    }
);

//////////////////////////////////////////////////////
// 現在地移動
//////////////////////////////////////////////////////

let autoCenter=true;

document.getElementById('gpsButton')
.onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({
        center:currentPosition,
        zoom:17
    });
};

//////////////////////////////////////////////////////
// 目的地検索
//////////////////////////////////////////////////////

let destinationMarker=null;

async function searchDestination(query){

    const url=
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

    const response=await fetch(url);

    const data=await response.json();

    if(!data.length){

        alert('見つかりません');
        return;
    }

    const result=data[0];

    const lng=parseFloat(result.lon);
    const lat=parseFloat(result.lat);

    setDestination([lng,lat],result.display_name);
}

//////////////////////////////////////////////////////
// 目的地設定
//////////////////////////////////////////////////////

async function setDestination(coord,name='目的地'){

    if(destinationMarker){

        destinationMarker.remove();
    }

    destinationMarker=
    new maplibregl.Marker({
        color:'red'
    })
    .setLngLat(coord)
    .setPopup(
        new maplibregl.Popup()
        .setHTML(`<b>${name}</b>`)
    )
    .addTo(map);

    map.flyTo({
        center:coord,
        zoom:16
    });

    if(currentPosition){

        getRoute(currentPosition,coord);
    }
}

//////////////////////////////////////////////////////
// ルート
//////////////////////////////////////////////////////

async function getRoute(start,end){

    const url=
`https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson`;

    const response=await fetch(url);

    const data=await response.json();

    const route=data.routes[0].geometry;

    if(map.getSource('route')){

        map.removeLayer('route');
        map.removeSource('route');
    }

    map.addSource('route',{
        type:'geojson',
        data:{
            type:'Feature',
            geometry:route
        }
    });

    map.addLayer({
        id:'route',
        type:'line',
        source:'route',
        paint:{
            'line-color':'#00ffff',
            'line-width':6
        }
    });
}

//////////////////////////////////////////////////////
// 検索ボタン
//////////////////////////////////////////////////////

document.getElementById('searchButton')
.onclick=()=>{

    const q=
    document.getElementById('destinationInput')
    .value;

    if(!q)return;

    searchDestination(q);
};

//////////////////////////////////////////////////////
// ルート消去
//////////////////////////////////////////////////////

document.getElementById('clearRouteButton')
.onclick=()=>{

    if(destinationMarker){

        destinationMarker.remove();
        destinationMarker=null;
    }

    if(map.getLayer('route')){

        map.removeLayer('route');
    }

    if(map.getSource('route')){

        map.removeSource('route');
    }
};

//////////////////////////////////////////////////////
// 手動目的地選択
//////////////////////////////////////////////////////

let manualMode=false;

document.getElementById('manualSelectButton')
.onclick=()=>{

    manualMode=!manualMode;

    alert(
        manualMode
        ?
        '地図をタップして目的地を設定'
        :
        '手動選択OFF'
    );
};

map.on('click',(e)=>{

    if(!manualMode)return;

    setDestination(
        [e.lngLat.lng,e.lngLat.lat],
        '手動選択'
    );

    manualMode=false;
});

//////////////////////////////////////////////////////
// 探索マッピング
//////////////////////////////////////////////////////

let mappingMode=false;

let exploredCoordinates=[];

map.on('load',()=>{

    //////////////////////////////////////////////////////
    // 探索済みライン
    //////////////////////////////////////////////////////

    map.addSource('explored',{
        type:'geojson',
        data:{
            type:'Feature',
            geometry:{
                type:'LineString',
                coordinates:[]
            }
        }
    });

    map.addLayer({

        id:'explored',

        type:'line',

        source:'explored',

        paint:{
            'line-color':'#00ff99',
            'line-width':5
        }
    });

    //////////////////////////////////////////////////////
    // 黒塗りレイヤー
    //////////////////////////////////////////////////////

    map.addSource('fog',{

        type:'geojson',

        data:{
            type:'Feature',
            geometry:{
                type:'Polygon',
                coordinates:[[
                    [-180,-85],
                    [180,-85],
                    [180,85],
                    [-180,85],
                    [-180,-85]
                ]]
            }
        }
    });

    map.addLayer({

        id:'fog',

        type:'fill',

        source:'fog',

        paint:{
            'fill-color':'black',
            'fill-opacity':0.88
        }
    });

    map.setLayoutProperty(
        'fog',
        'visibility',
        'none'
    );
});

//////////////////////////////////////////////////////
// 探索モード切替
//////////////////////////////////////////////////////

document.getElementById('mappingButton')
.onclick=()=>{

    mappingMode=!mappingMode;

    map.setLayoutProperty(
        'fog',
        'visibility',
        mappingMode
        ?
        'visible'
        :
        'none'
    );

    document.getElementById(
        'mappingModeIndicator'
    ).style.display=
    mappingMode
    ?
    'block'
    :
    'none';
};

//////////////////////////////////////////////////////
// 3D
//////////////////////////////////////////////////////

let building3D=false;

document.getElementById('toggle3d')
.onclick=()=>{

    if(!building3D){

        if(!map.getSource('openmaptiles')){

            map.addSource('openmaptiles',{
                type:'vector',
                url:'https://demotiles.maplibre.org/tiles/tiles.json'
            });

            map.addLayer({

                id:'3d-buildings',

                source:'openmaptiles',

                'source-layer':'building',

                type:'fill-extrusion',

                minzoom:15,

                paint:{

                    'fill-extrusion-color':'#aaa',

                    'fill-extrusion-height':
                    ['get','render_height'],

                    'fill-extrusion-base':
                    ['get','render_min_height'],

                    'fill-extrusion-opacity':0.6
                }
            });
        }

        building3D=true;

    }else{

        if(map.getLayer('3d-buildings')){

            map.removeLayer('3d-buildings');
        }

        building3D=false;
    }
};

//////////////////////////////////////////////////////
// HTTPS警告
//////////////////////////////////////////////////////

if(location.protocol!=='https:'){

    alert(
`iPhoneでGPSを使うにはHTTPSが必要です。

GitHub Pagesなどで公開してください。`
    );
}

</script>

</body>
</html>
