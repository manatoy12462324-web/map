<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>探索型ブラウザナビ</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:sans-serif;
    background:black;
}

#map{
    width:100%;
    height:100%;
}

/* ハンバーガー */

#menuButton{

    position:absolute;

    top:15px;
    left:15px;

    z-index:1000;

    width:55px;
    height:55px;

    border:none;
    border-radius:16px;

    background:rgba(20,20,20,0.92);

    color:white;

    font-size:28px;

    cursor:pointer;

    backdrop-filter:blur(10px);
}

/* サイドバー */

#sidebar{

    position:absolute;

    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.96);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;

    backdrop-filter:blur(10px);
}

#sidebar.open{
    left:0;
}

.title{

    font-size:18px;

    margin-top:20px;
    margin-bottom:10px;

    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    box-sizing:border-box;

    font-size:16px;
}

button.action{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.7);

    color:white;

    padding:10px 14px;

    border-radius:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">目的地検索</div>

    <input
        type="text"
        id="destinationInput"
        placeholder="目的地を入力"
    >

    <button class="action" id="searchButton">
        ルート検索
    </button>

    <button class="action" id="clearRouteButton">
        目的地＆ルート消去
    </button>

    <button class="action" id="manualSelectButton">
        地図タップで目的地選択
    </button>

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <button class="action" id="followButton">
        GPS追従 ON
    </button>

    <div class="title">探索ゲーム</div>

    <button class="action" id="gameModeButton">
        ゲームモード OFF
    </button>

    <button class="action" id="resetExploreButton">
        探索データ削除
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map = new maplibregl.Map({

    container:'map',

    style:{
        version:8,

        sources:{
            osm:{
                type:'raster',
                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],
                tileSize:256,
                attribution:'© OpenStreetMap'
            }
        },

        layers:[
            {
                id:'osm',
                type:'raster',
                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],
    zoom:15,
    pitch:45
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

const sidebar =
document.getElementById('sidebar');

document.getElementById('menuButton')
.onclick=()=>{

    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

const userMarker=
new maplibregl.Marker({
    color:'#00aaff'
});

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

let gameMode=false;

const TILE_SIZE=0.0003;

const STORAGE_KEY='explored_tiles_v1';

let exploredTiles=loadExploredTiles();

///////////////////////////////////////////////////////////////
// 保存読み込み
///////////////////////////////////////////////////////////////

function loadExploredTiles(){

    const saved=
        localStorage.getItem(STORAGE_KEY);

    if(saved){

        return JSON.parse(saved);
    }

    return {};
}

function saveExploredTiles(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(exploredTiles)
    );
}

///////////////////////////////////////////////////////////////
// タイルID
///////////////////////////////////////////////////////////////

function getTileId(lat,lng){

    const x=
        Math.floor(lng/TILE_SIZE);

    const y=
        Math.floor(lat/TILE_SIZE);

    return `${x}_${y}`;
}

///////////////////////////////////////////////////////////////
// Polygon生成
///////////////////////////////////////////////////////////////

function tileToPolygon(tileId){

    const split=
        tileId.split('_');

    const x=parseInt(split[0]);
    const y=parseInt(split[1]);

    const lng=x*TILE_SIZE;
    const lat=y*TILE_SIZE;

    return [[

        [lng,lat],
        [lng+TILE_SIZE,lat],
        [lng+TILE_SIZE,lat+TILE_SIZE],
        [lng,lat+TILE_SIZE],
        [lng,lat]

    ]];
}

///////////////////////////////////////////////////////////////
// GeoJSON
///////////////////////////////////////////////////////////////

function generateExploredGeoJSON(){

    const features=[];

    for(const tileId in exploredTiles){

        features.push({

            type:'Feature',

            geometry:{
                type:'Polygon',
                coordinates:
                    tileToPolygon(tileId)
            }
        });
    }

    return {

        type:'FeatureCollection',

        features:features
    };
}

///////////////////////////////////////////////////////////////
// ゲームマスク更新
///////////////////////////////////////////////////////////////

function updateGameMask(){

    const geojson=
        generateExploredGeoJSON();

    if(map.getSource('explored-area')){

        map.getSource('explored-area')
        .setData(geojson);
    }

    ///////////////////////////////////////////////////////////
    // 地図暗転
    ///////////////////////////////////////////////////////////

    map.setPaintProperty(

        'osm',

        'raster-opacity',

        gameMode
        ?
        0.08
        :
        1
    );

    ///////////////////////////////////////////////////////////
    // 探索済み表示
    ///////////////////////////////////////////////////////////

    map.setLayoutProperty(

        'explored-area-fill',

        'visibility',

        gameMode
        ?
        'visible'
        :
        'none'
    );
}

///////////////////////////////////////////////////////////////
// GPS更新
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const lat=
        position.coords.latitude;

    const lng=
        position.coords.longitude;

    currentPosition=[lng,lat];

    ///////////////////////////////////////////////////////////
    // マーカー
    ///////////////////////////////////////////////////////////

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    ///////////////////////////////////////////////////////////
    // GPS表示
    ///////////////////////////////////////////////////////////

    document.getElementById('gpsInfo')
    .innerText=
    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    ///////////////////////////////////////////////////////////
    // GPS追従
    ///////////////////////////////////////////////////////////

    if(followMode){

        map.flyTo({

            center:currentPosition,

            zoom:17,

            speed:1.2
        });
    }

    ///////////////////////////////////////////////////////////
    // 探索記録
    ///////////////////////////////////////////////////////////

    const tileId=
        getTileId(lat,lng);

    if(!exploredTiles[tileId]){

        exploredTiles[tileId]=true;

        saveExploredTiles();

        updateGameMask();
    }
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

navigator.geolocation.watchPosition(

(position)=>{

    updateGPS(position);

},

(err)=>{

    console.log(err);

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
});

///////////////////////////////////////////////////////////////
// 地図ロード
///////////////////////////////////////////////////////////////

map.on('load',()=>{

    ///////////////////////////////////////////////////////////
    // 探索済み
    ///////////////////////////////////////////////////////////

    map.addSource('explored-area',{

        type:'geojson',

        data:generateExploredGeoJSON()
    });

    ///////////////////////////////////////////////////////////
    // 明るい探索済み
    ///////////////////////////////////////////////////////////

    map.addLayer({

        id:'explored-area-fill',

        type:'fill',

        source:'explored-area',

        paint:{

            'fill-color':'white',

            'fill-opacity':0.92,

            'fill-outline-color':'#00ff99'
        }
    });

    ///////////////////////////////////////////////////////////
    // 初期非表示
    ///////////////////////////////////////////////////////////

    map.setLayoutProperty(

        'explored-area-fill',

        'visibility',

        'none'
    );
});

///////////////////////////////////////////////////////////////
// GPS追従ボタン
///////////////////////////////////////////////////////////////

document.getElementById('followButton')
.onclick=()=>{

    followMode=!followMode;

    document.getElementById(
        'followButton'
    ).innerText=

    followMode
    ?
    'GPS追従 ON'
    :
    'GPS追従 OFF';
};

///////////////////////////////////////////////////////////////
// 現在地移動
///////////////////////////////////////////////////////////////

document.getElementById('gpsButton')
.onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({

        center:currentPosition,

        zoom:17
    });
};

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

document.getElementById('gameModeButton')
.onclick=()=>{

    gameMode=!gameMode;

    updateGameMask();

    document.getElementById(
        'gameModeButton'
    ).innerText=

    gameMode
    ?
    'ゲームモード ON'
    :
    'ゲームモード OFF';
};

///////////////////////////////////////////////////////////////
// 探索削除
///////////////////////////////////////////////////////////////

document.getElementById('resetExploreButton')
.onclick=()=>{

    const ok=
    confirm(
        '探索データを削除しますか？'
    );

    if(!ok)return;

    exploredTiles={};

    saveExploredTiles();

    updateGameMask();
};

///////////////////////////////////////////////////////////////
// 目的地検索
///////////////////////////////////////////////////////////////

let destinationMarker=null;

async function searchDestination(query){

    const url=
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

    const response=
        await fetch(url);

    const data=
        await response.json();

    if(!data.length){

        alert('見つかりません');
        return;
    }

    const result=data[0];

    const lng=parseFloat(result.lon);
    const lat=parseFloat(result.lat);

    setDestination(
        [lng,lat],
        result.display_name
    );
}

///////////////////////////////////////////////////////////////
// 目的地設定
///////////////////////////////////////////////////////////////

async function setDestination(coord,name='目的地'){

    if(destinationMarker){

        destinationMarker.remove();
    }

    destinationMarker=
    new maplibregl.Marker({
        color:'red'
    })
    .setLngLat(coord)
    .setPopup(
        new maplibregl.Popup()
        .setHTML(`<b>${name}</b>`)
    )
    .addTo(map);

    map.flyTo({
        center:coord,
        zoom:16
    });

    if(currentPosition){

        getRoute(currentPosition,coord);
    }
}

///////////////////////////////////////////////////////////////
// ルート
///////////////////////////////////////////////////////////////

async function getRoute(start,end){

    const url=
`https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson`;

    const response=
        await fetch(url);

    const data=
        await response.json();

    const route=
        data.routes[0].geometry;

    if(map.getSource('route')){

        map.removeLayer('route');
        map.removeSource('route');
    }

    map.addSource('route',{

        type:'geojson',

        data:{
            type:'Feature',
            geometry:route
        }
    });

    map.addLayer({

        id:'route',

        type:'line',

        source:'route',

        paint:{
            'line-color':'#00ffff',
            'line-width':6
        }
    });
}

///////////////////////////////////////////////////////////////
// 検索
///////////////////////////////////////////////////////////////

document.getElementById('searchButton')
.onclick=()=>{

    const q=
    document.getElementById('destinationInput')
    .value;

    if(!q)return;

    searchDestination(q);
};

///////////////////////////////////////////////////////////////
// ルート消去
///////////////////////////////////////////////////////////////

document.getElementById('clearRouteButton')
.onclick=()=>{

    if(destinationMarker){

        destinationMarker.remove();

        destinationMarker=null;
    }

    if(map.getLayer('route')){

        map.removeLayer('route');
    }

    if(map.getSource('route')){

        map.removeSource('route');
    }
};

///////////////////////////////////////////////////////////////
// 手動目的地
///////////////////////////////////////////////////////////////

let manualMode=false;

document.getElementById('manualSelectButton')
.onclick=()=>{

    manualMode=!manualMode;

    alert(
        manualMode
        ?
        '地図をタップして目的地を設定'
        :
        '手動選択OFF'
    );
};

map.on('click',(e)=>{

    if(!manualMode)return;

    setDestination(
        [e.lngLat.lng,e.lngLat.lat],
        '手動選択'
    );

    manualMode=false;
});

///////////////////////////////////////////////////////////////
// HTTPS警告
///////////////////////////////////////////////////////////////

if(location.protocol!=='https:'){

    alert(
`iPhoneでGPSを使うにはHTTPSが必要です。

GitHub Pagesなどで公開してください。`
    );
}

</script>

</body>
</html>
