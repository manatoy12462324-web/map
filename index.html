<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>OSM Browser Navi</title>

<!-- MapLibre -->
<link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #000;
}

#map {
    width: 100%;
    height: 100%;
}

/* ハンバーガー */
#menuButton {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 1000;
    width: 52px;
    height: 52px;
    border-radius: 14px;
    border: none;
    background: rgba(20,20,20,0.9);
    color: white;
    font-size: 26px;
    cursor: pointer;
    backdrop-filter: blur(10px);
}

/* サイドメニュー */
#sidebar {
    position: absolute;
    top: 0;
    left: -340px;
    width: 320px;
    height: 100%;
    background: rgba(15,15,15,0.96);
    z-index: 999;
    transition: left 0.3s ease;
    padding: 80px 20px 20px;
    box-sizing: border-box;
    overflow-y: auto;
    color: white;
    backdrop-filter: blur(12px);
}

#sidebar.open {
    left: 0;
}

.sectionTitle {
    font-size: 18px;
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-bottom: 10px;
    font-size: 16px;
    box-sizing: border-box;
}

button.action {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-bottom: 10px;
    background: #2196f3;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.infoBox {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    font-size: 14px;
}

#gpsStatus {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
}

.maplibregl-popup-content {
    border-radius: 12px;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="sectionTitle">目的地検索</div>

    <input type="text" id="destinationInput" placeholder="目的地を入力">

    <button class="action" id="searchButton">
        ルート検索
    </button>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <div class="sectionTitle">地図表示</div>

    <button class="action" id="toggle3d">
        3D建物 ON/OFF
    </button>

    <button class="action" id="toggleTrack">
        GPS軌跡 ON/OFF
    </button>

    <div class="sectionTitle">情報</div>

    <div class="infoBox">
        地図:
        :contentReference[oaicite:0]{index=0}
        <br><br>
        描画:
        :contentReference[oaicite:1]{index=1}
        <br><br>
        ルート:
        OSRM
        <br><br>
        検索:
        Overpass API / Nominatim
    </div>

</div>

<div id="gpsStatus">
    GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////
// MapLibre 初期化
///////////////////////////////////////////////////////////

const map = new maplibregl.Map({
    container: 'map',

    style: {
        version: 8,

        sources: {
            osm: {
                type: 'raster',
                tiles: [
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                attribution:
                    '&copy; OpenStreetMap Contributors'
            }
        },

        layers: [
            {
                id: 'osm',
                type: 'raster',
                source: 'osm'
            }
        ]
    },

    center: [135.7681, 35.0116], // 京都
    zoom: 15,
    pitch: 45,
    bearing: 0
});

///////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////

const sidebar = document.getElementById('sidebar');
const menuButton = document.getElementById('menuButton');

menuButton.onclick = () => {
    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////
// 現在地
///////////////////////////////////////////////////////////

let currentPosition = null;

const userMarker = new maplibregl.Marker({
    color: '#2196f3'
});

function updateGPS(position) {

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    currentPosition = [lng, lat];

    userMarker
        .setLngLat(currentPosition)
        .addTo(map);

    map.flyTo({
        center: currentPosition,
        zoom: 17,
        speed: 1.2
    });

    document.getElementById('gpsStatus').innerText =
        `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

function gpsError(err) {
    document.getElementById('gpsStatus').innerText =
        'GPS取得失敗';
}

navigator.geolocation.watchPosition(
    updateGPS,
    gpsError,
    {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
    }
);

///////////////////////////////////////////////////////////
// 現在地へ移動
///////////////////////////////////////////////////////////

document.getElementById('gpsButton').onclick = () => {

    if (!currentPosition) return;

    map.flyTo({
        center: currentPosition,
        zoom: 17
    });
};

///////////////////////////////////////////////////////////
// 目的地検索（Nominatim）
///////////////////////////////////////////////////////////

let destinationMarker = null;

async function searchDestination(query) {

    const url =
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

    const response = await fetch(url);

    const data = await response.json();

    if (!data.length) {
        alert('見つかりませんでした');
        return;
    }

    const result = data[0];

    const lng = parseFloat(result.lon);
    const lat = parseFloat(result.lat);

    if (destinationMarker) {
        destinationMarker.remove();
    }

    destinationMarker =
        new maplibregl.Marker({
            color: 'red'
        })
        .setLngLat([lng, lat])
        .setPopup(
            new maplibregl.Popup()
            .setHTML(`<b>${result.display_name}</b>`)
        )
        .addTo(map);

    map.flyTo({
        center: [lng, lat],
        zoom: 16
    });

    if (currentPosition) {
        getRoute(currentPosition, [lng, lat]);
    }
}

///////////////////////////////////////////////////////////
// OSRMルート
///////////////////////////////////////////////////////////

async function getRoute(start, end) {

    const url =
`https://router.project-osrm.org/route/v1/driving/
${start[0]},${start[1]};
${end[0]},${end[1]}
?overview=full&geometries=geojson`;

    const response = await fetch(url);

    const data = await response.json();

    const route = data.routes[0].geometry;

    if (map.getSource('route')) {
        map.removeLayer('route');
        map.removeSource('route');
    }

    map.addSource('route', {
        type: 'geojson',
        data: {
            type: 'Feature',
            geometry: route
        }
    });

    map.addLayer({
        id: 'route',
        type: 'line',
        source: 'route',
        paint: {
            'line-color': '#00e5ff',
            'line-width': 6
        }
    });
}

document.getElementById('searchButton').onclick = () => {

    const query =
        document.getElementById('destinationInput').value;

    if (!query) return;

    searchDestination(query);
};

///////////////////////////////////////////////////////////
// GPS軌跡
///////////////////////////////////////////////////////////

let trackingEnabled = true;

const trackGeoJSON = {
    type: 'Feature',
    geometry: {
        type: 'LineString',
        coordinates: []
    }
};

map.on('load', () => {

    map.addSource('track', {
        type: 'geojson',
        data: trackGeoJSON
    });

    map.addLayer({
        id: 'track',
        type: 'line',
        source: 'track',
        paint: {
            'line-color': '#00ff99',
            'line-width': 4
        }
    });
});

navigator.geolocation.watchPosition((pos) => {

    if (!trackingEnabled) return;

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    trackGeoJSON.geometry.coordinates.push([lng, lat]);

    if (map.getSource('track')) {
        map.getSource('track').setData(trackGeoJSON);
    }

});

document.getElementById('toggleTrack').onclick = () => {

    trackingEnabled = !trackingEnabled;

    map.setLayoutProperty(
        'track',
        'visibility',
        trackingEnabled ? 'visible' : 'none'
    );
};

///////////////////////////////////////////////////////////
// 3D建物
///////////////////////////////////////////////////////////

let building3D = false;

document.getElementById('toggle3d').onclick = () => {

    if (!building3D) {

        if (!map.getSource('openmaptiles')) {

            map.addSource('openmaptiles', {
                type: 'vector',
                url: 'https://demotiles.maplibre.org/tiles/tiles.json'
            });

            map.addLayer({
                id: '3d-buildings',
                source: 'openmaptiles',
                'source-layer': 'building',
                type: 'fill-extrusion',
                minzoom: 15,
                paint: {
                    'fill-extrusion-color': '#aaa',
                    'fill-extrusion-height': [
                        'get',
                        'render_height'
                    ],
                    'fill-extrusion-base': [
                        'get',
                        'render_min_height'
                    ],
                    'fill-extrusion-opacity': 0.6
                }
            });
        }

        building3D = true;

    } else {

        if (map.getLayer('3d-buildings')) {
            map.removeLayer('3d-buildings');
        }

        building3D = false;
    }
};

///////////////////////////////////////////////////////////
// iPhone HTTPS警告
///////////////////////////////////////////////////////////

if (location.protocol !== 'https:') {

    alert(
`iPhoneでGPSを使うにはHTTPSが必要です。

GitHub Pagesなどで公開してください。`
    );
}

</script>

</body>
</html>
