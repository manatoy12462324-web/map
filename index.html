<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>無料OSM GPSナビ</title>

<!-- MapLibre GL JS -->

<link
  href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css"
  rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  overflow:hidden;
  background:#111;
  color:white;
}

#map{
  width:100vw;
  height:100vh;
}

/* =======================
UI
======================= */

.ui{

  position:absolute;

  top:10px;
  left:10px;

  z-index:1000;

  width:calc(100% - 20px);
  max-width:420px;

  background:rgba(0,0,0,0.85);

  padding:14px;

  border-radius:18px;

  backdrop-filter:blur(12px);
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:12px;
}

input,
select,
button{

  width:100%;

  margin-bottom:10px;

  padding:12px;

  border:none;

  border-radius:10px;

  font-size:16px;
}

button{
  background:#0a84ff;
  color:white;
  font-weight:bold;
}

button:active{
  opacity:0.8;
}

#info{
  font-size:14px;
  line-height:1.6;
}

/* =======================
GPSボタン
======================= */

.gps-btn{

  position:absolute;

  right:10px;
  bottom:20px;

  z-index:1000;

  width:60px;
  height:60px;

  border-radius:50%;

  border:none;

  background:#0a84ff;

  color:white;

  font-size:26px;

  font-weight:bold;
}

/* =======================
ダークポップアップ
======================= */

.maplibregl-popup-content{

  background:#222;
  color:white;

  border-radius:12px;
}

</style>
</head>
<body>

<!-- UI -->

<div class="ui">

  <div class="title">
    🚗 無料OSMナビ
  </div>

  <input
    type="text"
    id="destination"
    placeholder="目的地を入力"
  />

  <select id="mode">

    <option value="driving">
      車
    </option>

    <option value="walking">
      徒歩
    </option>

  </select>

  <button onclick="startNavigation()">
    ナビ開始
  </button>

  <button onclick="toggleFollow()">
    GPS追尾 ON/OFF
  </button>

  <button onclick="showPOI('convenience')">
    コンビニ
  </button>

  <button onclick="showPOI('parking')">
    駐車場
  </button>

  <button onclick="showPOI('fuel')">
    ガソリン
  </button>

  <button onclick="showPOI('station')">
    駅
  </button>

  <button onclick="toggleRailway()">
    鉄道路線
  </button>

  <div id="info">
    GPS待機中...
  </div>

</div>

<!-- GPS中央移動 -->

<button
  class="gps-btn"
  onclick="moveToCurrentLocation()"
>
📍
</button>

<!-- 地図 -->

<div id="map"></div>

<script>

// =====================================
// 状態管理
// =====================================

let currentLat = 35.0116;
let currentLng = 135.7681;

let followMode = true;

let railwayVisible = false;

let poiMarkers = [];

// =====================================
// 地図初期化
// =====================================

const map = new maplibregl.Map({

  container:'map',

  style:
'https://tile.openstreetmap.jp/styles/osm-bright-ja/style.json',

  center:[
    currentLng,
    currentLat
  ],

  zoom:16
});

// ナビUI

map.addControl(
  new maplibregl.NavigationControl()
);

// =====================================
// 現在地マーカー
// =====================================

const userMarker =
new maplibregl.Marker({

  color:'#0a84ff'

})

.setLngLat([
  currentLng,
  currentLat
])

.addTo(map);

// =====================================
// GPS
// =====================================

if(navigator.geolocation){

  navigator.geolocation.watchPosition(

    (position)=>{

      currentLat =
        position.coords.latitude;

      currentLng =
        position.coords.longitude;

      // マーカー移動

      userMarker.setLngLat([
        currentLng,
        currentLat
      ]);

      // GPS追尾

      if(followMode){

        map.easeTo({

          center:[
            currentLng,
            currentLat
          ],

          zoom:17,

          duration:1000
        });
      }

      // 情報表示

      document.getElementById(
        'info'
      ).innerHTML = `
        🚗 GPS動作中<br>
        緯度:${currentLat.toFixed(6)}<br>
        経度:${currentLng.toFixed(6)}
      `;
    },

    (error)=>{

      console.error(error);

      alert('GPS取得失敗');
    },

    {

      enableHighAccuracy:true,

      timeout:10000,

      maximumAge:0
    }
  );
}

// =====================================
// GPS追尾
// =====================================

function toggleFollow(){

  followMode = !followMode;

  alert(
    `GPS追尾 ${
      followMode ? 'ON':'OFF'
    }`
  );
}

// =====================================
// 現在地移動
// =====================================

function moveToCurrentLocation(){

  map.flyTo({

    center:[
      currentLng,
      currentLat
    ],

    zoom:17
  });
}

// =====================================
// 音声
// =====================================

function speak(text){

  const utterance =
    new SpeechSynthesisUtterance(text);

  utterance.lang = 'ja-JP';

  speechSynthesis.speak(utterance);
}

// =====================================
// ナビ開始
// =====================================

async function startNavigation(){

  try{

    const destination =
      document.getElementById(
        'destination'
      ).value;

    if(!destination){

      alert('目的地入力');

      return;
    }

    // =====================================
    // OSM住所検索
    // =====================================

    const geoResponse =
      await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destination)}`
      );

    const geoData =
      await geoResponse.json();

    if(geoData.length === 0){

      alert('目的地なし');

      return;
    }

    const destLat =
      geoData[0].lat;

    const destLng =
      geoData[0].lon;

    // =====================================
    // 車 or 徒歩
    // =====================================

    const mode =
      document.getElementById(
        'mode'
      ).value;

    // =====================================
    // OSRMルート
    // =====================================

    const routeResponse =
      await fetch(
`https://router.project-osrm.org/route/v1/${mode}/${currentLng},${currentLat};${destLng},${destLat}?overview=full&geometries=geojson`
      );

    const routeData =
      await routeResponse.json();

    const coordinates =
      routeData.routes[0]
      .geometry.coordinates;

    // =====================================
    // 既存削除
    // =====================================

    if(map.getLayer('route')){

      map.removeLayer('route');
    }

    if(map.getSource('route')){

      map.removeSource('route');
    }

    // =====================================
    // ルート描画
    // =====================================

    map.addSource('route',{

      type:'geojson',

      data:{

        type:'Feature',

        geometry:{

          type:'LineString',

          coordinates:coordinates
        }
      }
    });

    map.addLayer({

      id:'route',

      type:'line',

      source:'route',

      layout:{

        'line-cap':'round',

        'line-join':'round'
      },

      paint:{

        'line-color':'#0a84ff',

        'line-width':6
      }
    });

    // =====================================
    // 地図フィット
    // =====================================

    const bounds =
      new maplibregl.LngLatBounds();

    coordinates.forEach(coord=>{

      bounds.extend(coord);
    });

    map.fitBounds(bounds,{

      padding:50
    });

    // =====================================
    // 距離
    // =====================================

    const distance =
      (
        routeData.routes[0]
        .distance / 1000
      ).toFixed(1);

    // =====================================
    // 時間
    // =====================================

    const time =
      Math.round(
        routeData.routes[0]
        .duration / 60
      );

    // =====================================
    // 情報表示
    // =====================================

    document.getElementById(
      'info'
    ).innerHTML = `
      🚗 ナビ案内中<br>
      距離:${distance} km<br>
      時間:${time}分
    `;

    // =====================================
    // 音声
    // =====================================

    speak(
      `ルート案内を開始します。距離${distance}キロ。約${time}分です`
    );

  }catch(err){

    console.error(err);

    alert('ナビ失敗');
  }
}

// =====================================
// POI表示
// =====================================

async function showPOI(type){

  poiMarkers.forEach(
    marker=>marker.remove()
  );

  poiMarkers = [];

  let query = '';

  // =========================
  // コンビニ
  // =========================

  if(type === 'convenience'){

    query =
`
[out:json];
node
(around:1000,${currentLat},${currentLng})
[shop=convenience];
out;
`;
  }

  // =========================
  // 駐車場
  // =========================

  if(type === 'parking'){

    query =
`
[out:json];
node
(around:1000,${currentLat},${currentLng})
[amenity=parking];
out;
`;
  }

  // =========================
  // ガソリン
  // =========================

  if(type === 'fuel'){

    query =
`
[out:json];
node
(around:1000,${currentLat},${currentLng})
[amenity=fuel];
out;
`;
  }

  // =========================
  // 駅
  // =========================

  if(type === 'station'){

    query =
`
[out:json];
node
(around:1000,${currentLat},${currentLng})
[railway=station];
out;
`;
  }

  // =========================
  // Overpass API
  // =========================

  const response =
    await fetch(
      'https://overpass-api.de/api/interpreter',
      {
        method:'POST',
        body:query
      }
    );

  const data =
    await response.json();

  data.elements.forEach(place=>{

    const marker =
      new maplibregl.Marker({
        color:'#ff3b30'
      })

      .setLngLat([
        place.lon,
        place.lat
      ])

      .setPopup(

        new maplibregl.Popup()

        .setHTML(`
          <b>
            ${place.tags.name || '施設'}
          </b>
        `)
      )

      .addTo(map);

    poiMarkers.push(marker);
  });

  alert(
    `${data.elements.length}件表示`
  );
}

// =====================================
// 鉄道路線
// =====================================

function toggleRailway(){

  if(railwayVisible){

    if(map.getLayer('railway-layer')){

      map.removeLayer(
        'railway-layer'
      );
    }

    if(map.getSource('railway')){

      map.removeSource(
        'railway'
      );
    }

    railwayVisible = false;

    return;
  }

  map.addSource('railway',{

    type:'raster',

    tiles:[
'https://a.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png'
    ],

    tileSize:256
  });

  map.addLayer({

    id:'railway-layer',

    type:'raster',

    source:'railway'
  });

  railwayVisible = true;
}

</script>
</body>
</html>
