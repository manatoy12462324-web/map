</style>
</head>

<body>

<canvas id="fogCanvas"></canvas>

GPS取得中...

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map=new maplibregl.Map({

    container:'map',

    style:{

        version:8,

        sources:{

            osm:{

                type:'raster',

                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],

                tileSize:256,

                attribution:'© OpenStreetMap'
            }
        },

        layers:[

            {

                id:'osm',

                type:'raster',

                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],

    zoom:10,

    pitch:0
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

const sidebar=
document.getElementById('sidebar');

document.getElementById(
'menuButton'
).onclick=()=>{

    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////////
// 状態
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

let northUp=false;

let navigationMode='driving';

let selectDestinationMode=false;

let destinationMarker=null;

let gameMode=false;

let currentSteps=[];

let currentStepIndex=0;

let avoidToll=false;

let friendMarker=null;

let gpsWatchId=null;

let lastGPSUpdate=0;

let lastNextInstructionUpdate=0;

let lastGameMaskUpdate=0;

///////////////////////////////////////////////////////////////
// RPGマスク
///////////////////////////////////////////////////////////////

const fogCanvas =
document.getElementById('fogCanvas');

const fogCtx =
fogCanvas.getContext('2d');

function resizeFogCanvas(){

    fogCanvas.width =
    window.innerWidth;

    fogCanvas.height =
    window.innerHeight;
}

resizeFogCanvas();

window.addEventListener(
    'resize',
    resizeFogCanvas
);

///////////////////////////////////////////////////////////////
// RPGマスク描画
///////////////////////////////////////////////////////////////

function drawFogMask(){

    /////////////////////////////////////////////////////////
    // OFFなら非表示
    /////////////////////////////////////////////////////////

    if(!gameMode)return;

    /////////////////////////////////////////////////////////
    // 全消去
    /////////////////////////////////////////////////////////

    fogCtx.clearRect(
        0,
        0,
        fogCanvas.width,
        fogCanvas.height
    );

    /////////////////////////////////////////////////////////
    // 黒マスク
    /////////////////////////////////////////////////////////

    fogCtx.fillStyle =
    'rgba(0,0,0,0.96)';

    fogCtx.fillRect(
        0,
        0,
        fogCanvas.width,
        fogCanvas.height
    );

    /////////////////////////////////////////////////////////
    // 穴あけモード
    /////////////////////////////////////////////////////////

    fogCtx.globalCompositeOperation =
    'destination-out';

    /////////////////////////////////////////////////////////
    // 探索済み描画
    /////////////////////////////////////////////////////////

    for(const tileId in exploredTiles){

        const split =
        tileId.split('_');

        const x =
        parseInt(split[0]);

        const y =
        parseInt(split[1]);

        /////////////////////////////////////////////////////
        // タイル中心座標
        /////////////////////////////////////////////////////

        const lng =
        x*TILE_SIZE + TILE_SIZE/2;

        const lat =
        y*TILE_SIZE + TILE_SIZE/2;

        /////////////////////////////////////////////////////
        // map → screen
        /////////////////////////////////////////////////////

        const point =
        map.project([lng,lat]);

        /////////////////////////////////////////////////////
        // 白で描画（←超重要）
        /////////////////////////////////////////////////////

        fogCtx.fillStyle =
    'rgba(255,255,255,1)';

    fogCtx.fillRect(

    point.x - TILE_PIXEL_SIZE/2,
    point.y - TILE_PIXEL_SIZE/2,

    TILE_PIXEL_SIZE,
    TILE_PIXEL_SIZE
    );
    }

    /////////////////////////////////////////////////////////
    // 現在地ライト
    /////////////////////////////////////////////////////////

    if(currentPosition){

        const p =
        map.project(currentPosition);

        fogCtx.fillRect(

    p.x - TILE_PIXEL_SIZE,
    p.y - TILE_PIXEL_SIZE,

    TILE_PIXEL_SIZE*2,
    TILE_PIXEL_SIZE*2
);
    }

    /////////////////////////////////////////////////////////
    // 戻す
    /////////////////////////////////////////////////////////

    fogCtx.globalCompositeOperation =
    'source-over';
}

///////////////////////////////////////////////////////////////
// 探索ゲーム
///////////////////////////////////////////////////////////////

const TILE_SIZE=0.00015;
/////////////////////////////////////////////////////////////
// 表示タイルサイズ（画面px）
/////////////////////////////////////////////////////////////

const TILE_PIXEL_SIZE = 70;
const STORAGE_KEY='explored_tiles_v2';

let exploredTiles = loadExploredTiles();

///////////////////////////////////////////////////////////////
// ナビマーカー
///////////////////////////////////////////////////////////////

const navMarker=document.createElement('div');

navMarker.style.width='42px';
navMarker.style.height='42px';

navMarker.style.background=
'url(https://cdn-icons-png.flaticon.com/512/684/684908.png)';

navMarker.style.backgroundSize='contain';

navMarker.style.backgroundRepeat='no-repeat';

const userMarker=
new maplibregl.Marker({

    element:navMarker
});

///////////////////////////////////////////////////////////////
// 音声
///////////////////////////////////////////////////////////////

function speak(text){

    const utter=
    new SpeechSynthesisUtterance(text);

    utter.lang='ja-JP';

    speechSynthesis.speak(utter);
}

///////////////////////////////////////////////////////////////
// 探索データ
///////////////////////////////////////////////////////////////

function loadExploredTiles(){

    const saved =
    localStorage.getItem(STORAGE_KEY);

    if(saved){

        return JSON.parse(saved);
    }

    return {};
}

function saveExploredTiles(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(exploredTiles)
    );
}

///////////////////////////////////////////////////////////////
// タイル
///////////////////////////////////////////////////////////////

function getTileId(lat,lng){

    const x=
    Math.floor(lng/TILE_SIZE);

    const y=
    Math.floor(lat/TILE_SIZE);

    return `${x}_${y}`;
}

function tileToPolygon(tileId){

    const split=
    tileId.split('_');

    const x=parseInt(split[0]);
    const y=parseInt(split[1]);

    const lng=x*TILE_SIZE;
    const lat=y*TILE_SIZE;

    return [

        [lng,lat],
        [lng+TILE_SIZE,lat],
        [lng+TILE_SIZE,lat+TILE_SIZE],
        [lng,lat+TILE_SIZE],
        [lng,lat]
    ];
}

///////////////////////////////////////////////////////////////
// マスク
///////////////////////////////////////////////////////////////

function buildExploreGeoJSON(){

    const features=[];

    for(const tileId in exploredTiles){

        const split=tileId.split('_');

        const x=parseInt(split[0]);
        const y=parseInt(split[1]);

        const lng=x*TILE_SIZE;
        const lat=y*TILE_SIZE;

        features.push({

            type:'Feature',

            geometry:{
                type:'Polygon',

                coordinates:[[
                    [lng,lat],
                    [lng+TILE_SIZE,lat],
                    [lng+TILE_SIZE,lat+TILE_SIZE],
                    [lng,lat+TILE_SIZE],
                    [lng,lat]
                ]]
            }
        });
    }

    return {

        type:'FeatureCollection',

        features
    };
}


///////////////////////////////////////////////////////////////
// マスク更新
///////////////////////////////////////////////////////////////

function updateGameMask(){

    fogCanvas.style.display =
    gameMode
    ?
    'block'
    :
    'none';

    if(gameMode){

        drawFogMask();
    }
}

///////////////////////////////////////////////////////////////
// 制限速度
///////////////////////////////////////////////////////////////

function updateSpeedLimit(){

    let limit=50;

    if(map.getZoom()>16){

        limit=30;
    }

    document.getElementById(
        'speedLimit'
    ).innerText=limit;
}

///////////////////////////////////////////////////////////////
// 次案内
///////////////////////////////////////////////////////////////

function updateNextInstruction(){

    if(!currentSteps.length)return;

    ///////////////////////////////////////////////////////////
    // 現在ステップ
    ///////////////////////////////////////////////////////////

    const step=
    currentSteps[currentStepIndex];

    if(!step)return;

    ///////////////////////////////////////////////////////////
    // 次ステップ
    ///////////////////////////////////////////////////////////

    const nextStep=
    currentSteps[currentStepIndex+1];

    ///////////////////////////////////////////////////////////
    // modifier取得
    ///////////////////////////////////////////////////////////

    const modifier=
    step.maneuver.modifier || '';

    ///////////////////////////////////////////////////////////
    // 日本語方向変換
    ///////////////////////////////////////////////////////////

    function convertDirection(mod){

        switch(mod){

            case 'right':
                return '右方向';

            case 'left':
                return '左方向';

            case 'slight right':
                return '斜め右方向';

            case 'slight left':
                return '斜め左方向';

            case 'sharp right':
                return '鋭く右方向';

            case 'sharp left':
                return '鋭く左方向';

            case 'uturn':
                return 'Uターン';

            default:
                return '直進';
        }
    }

    ///////////////////////////////////////////////////////////
    // 現在方向
    ///////////////////////////////////////////////////////////

    const direction=
    convertDirection(modifier);

    ///////////////////////////////////////////////////////////
    // 距離表示
    ///////////////////////////////////////////////////////////

    let distance=
    step.distance;

    let distanceText='';

    ///////////////////////////////////////////////////////////
    // 1km以上
    ///////////////////////////////////////////////////////////

    if(distance>=1000){

        distanceText=
        (distance/1000).toFixed(1)
        +'km';
    }

    ///////////////////////////////////////////////////////////
    // 100m〜950m
    ///////////////////////////////////////////////////////////

    else if(distance>=100){

        distanceText=
        (Math.round(distance/50)*50)
        +'m';
    }

    ///////////////////////////////////////////////////////////
    // 10m〜100m
    ///////////////////////////////////////////////////////////

    else if(distance>=10){

        distanceText=
        (Math.round(distance/10)*10)
        +'m';
    }

    ///////////////////////////////////////////////////////////
    // 10m未満
    ///////////////////////////////////////////////////////////

    else{

        distanceText=
        Math.round(distance)
        +'m';
    }

    ///////////////////////////////////////////////////////////
    // メイン表示
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'nextTurn'
    ).innerHTML=

`
${distanceText}先

<br>

${direction}
`;

    ///////////////////////////////////////////////////////////
    // 次の次の案内
    ///////////////////////////////////////////////////////////

    if(nextStep){

        const nextDirection=
        convertDirection(
            nextStep.maneuver.modifier || ''
        );

        ///////////////////////////////////////////////////////////
// 次の次の距離
///////////////////////////////////////////////////////////

let nextDistance=
nextStep.distance;

let nextDistanceText='';

if(nextDistance>=1000){

    nextDistanceText=
    (nextDistance/1000).toFixed(1)
    +'km';

}else if(nextDistance>=100){

    nextDistanceText=
    (Math.round(nextDistance/50)*50)
    +'m';

}else if(nextDistance>=10){

    nextDistanceText=
    (Math.round(nextDistance/10)*10)
    +'m';

}else{

    nextDistanceText=
    Math.round(nextDistance)
    +'m';
}

///////////////////////////////////////////////////////////
// NEXT表示
///////////////////////////////////////////////////////////

document.getElementById(
    'nextSubTurn'
).innerHTML=

`
${nextDistanceText}<br>
${nextDirection}
`;

    }else{

        document.getElementById(
            'nextSubTurn'
        ).innerHTML=

        '到着';
    }
}

///////////////////////////////////////////////////////////////
// 友達マーカー
///////////////////////////////////////////////////////////////

function loadFriendMarker(){

    if(friendMarker){

        friendMarker.remove();
    }

    const div=
    document.createElement('div');

    div.className='friend-marker';

    const friendLng=
    currentPosition
    ?
    currentPosition[0]+0.003
    :
    135.771;

    const friendLat=
    currentPosition
    ?
    currentPosition[1]+0.002
    :
    35.012;

    friendMarker=
    new maplibregl.Marker({

        element:div
    })

    .setLngLat([friendLng,friendLat])

    .addTo(map);
}

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const isWalking =
    navigationMode==='walking';

    const lat=
    position.coords.latitude;

    const lng=
    position.coords.longitude;

    const heading=
    position.coords.heading || 0;

    currentPosition=[lng,lat];

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    navMarker.style.transform=
    `rotate(${heading}deg)`;

    document.getElementById(
        'gpsInfo'
    ).innerText=

    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    if(followMode){

       if(isWalking){

    map.jumpTo({

        center:currentPosition
    });

}else{

    map.easeTo({

        center:currentPosition,

        zoom:map.getZoom(),

        bearing:
        northUp
        ?
        0
        :
        heading,

        duration:1000
    });
}
    }


/////////////////////////////////////////////////////////////
// 制限速度
/////////////////////////////////////////////////////////////

if(!isWalking){

    updateSpeedLimit();
}

/////////////////////////////////////////////////////////////
// ナビUI更新
/////////////////////////////////////////////////////////////

if(isWalking){

    const now=Date.now();

    /////////////////////////////////////////////////////////
    // 徒歩は5秒ごと
    /////////////////////////////////////////////////////////

    if(
        now-lastNextInstructionUpdate
        >
        5000
    ){

        updateNextInstruction();

        lastNextInstructionUpdate=now;
    }

}else{

    /////////////////////////////////////////////////////////
    // 車モード
    /////////////////////////////////////////////////////////

    updateNextInstruction();

    loadFriendMarker();
}

    /////////////////////////////////////////////////////////////
// 現在位置タイル取得
/////////////////////////////////////////////////////////////

const tileId=
getTileId(lat,lng);

/////////////////////////////////////////////////////////////
// 新規探索タイル
/////////////////////////////////////////////////////////////

if(!exploredTiles[tileId]){

    /////////////////////////////////////////////////////////
    // 保存
    /////////////////////////////////////////////////////////

    exploredTiles[tileId]=true;

    /////////////////////////////////////////////////////////
    // 永続化
    /////////////////////////////////////////////////////////

    saveExploredTiles();
}

/////////////////////////////////////////////////////////////
// ゲームモードなら毎回描画
/////////////////////////////////////////////////////////////

if(gameMode){

    drawFogMask();
}

/////////////////////////////////////////////////////////////
// ゲームマスク再描画
/////////////////////////////////////////////////////////////

if(gameMode){

    drawFogMask();
}
}

function startGPSWatch(){

    ///////////////////////////////////////////////////////////
    // 既存停止
    ///////////////////////////////////////////////////////////

    if(gpsWatchId!==null){

        navigator.geolocation.clearWatch(
            gpsWatchId
        );
    }

    ///////////////////////////////////////////////////////////
    // 徒歩判定
    ///////////////////////////////////////////////////////////

    const isWalking =
    navigationMode==='walking';

    ///////////////////////////////////////////////////////////
    // GPS設定
    ///////////////////////////////////////////////////////////

    const options={

        enableHighAccuracy:
        !isWalking,

        maximumAge:
        isWalking
        ?
        5000
        :
        0,

        timeout:
        isWalking
        ?
        20000
        :
        10000
    };

    ///////////////////////////////////////////////////////////
    // 更新頻度
    ///////////////////////////////////////////////////////////

    const minUpdateInterval=
    isWalking
    ?
    7000
    :
    500;

    ///////////////////////////////////////////////////////////
    // GPS開始
    ///////////////////////////////////////////////////////////

    gpsWatchId=
    navigator.geolocation.watchPosition(

        (position)=>{

            const now=Date.now();

            ///////////////////////////////////////////////////
            // 更新頻度制御
            ///////////////////////////////////////////////////

            if(
                now-lastGPSUpdate
                <
                minUpdateInterval
            ){
                return;
            }

            lastGPSUpdate=now;

            updateGPS(position);
        },

        (err)=>{

            console.log(err);

            document.getElementById(
                'gpsInfo'
            ).innerText=

            'GPSエラー';
        },

        options
    );
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

startGPSWatch();

///////////////////////////////////////////////////////////////
// 目的地マーカー
///////////////////////////////////////////////////////////////

function setDestinationMarker(lng,lat){

    if(destinationMarker){

        destinationMarker.remove();
    }

    destinationMarker=
    new maplibregl.Marker({

        color:'#ff3333'
    })

    .setLngLat([lng,lat])

    .addTo(map);

    document.getElementById(
        'destinationInput'
    ).value=

    `${lat},${lng}`;
}

///////////////////////////////////////////////////////////////
// 地図タップ目的地
///////////////////////////////////////////////////////////////

map.on('click',(e)=>{

    if(!selectDestinationMode)return;

    const lng=e.lngLat.lng;
    const lat=e.lngLat.lat;

    setDestinationMarker(lng,lat);

    speak('目的地を設定しました');
});

///////////////////////////////////////////////////////////////
// ルート
///////////////////////////////////////////////////////////////

async function startRoute(){

    if(!currentPosition){

        alert('GPS取得中');
        return;
    }

    const input=
    document.getElementById(
        'destinationInput'
    ).value.trim();

    if(!input){

        alert('目的地未入力');
        return;
    }

    const split=input.split(',');

    if(split.length!==2){

        alert('緯度,経度');
        return;
    }

    const lat=
    parseFloat(split[0]);

    const lng=
    parseFloat(split[1]);

    if(isNaN(lat)||isNaN(lng)){

        alert('座標エラー');
        return;
    }

    setDestinationMarker(lng,lat);

    const profile=
    navigationMode==='walking'
    ?
    'foot'
    :
    'driving';

    const url=
`https://router.project-osrm.org/route/v1/${profile}/${currentPosition[0]},${currentPosition[1]};${lng},${lat}?overview=full&geometries=geojson&steps=true`;

    const res=
    await fetch(url);

    const data=
    await res.json();

    if(
        !data.routes
        ||
        !data.routes.length
    ){

        alert('ルート取得失敗');
        return;
    }

    const route=
    data.routes[0];

    ///////////////////////////////////////////////////////////////
// 距離
///////////////////////////////////////////////////////////////

const km=
(route.distance/1000)
.toFixed(1);

///////////////////////////////////////////////////////////////
// 時間
///////////////////////////////////////////////////////////////

const totalMinutes=
Math.round(
    route.duration/60
);

const hours=
Math.floor(totalMinutes/60);

const minutes=
totalMinutes%60;

///////////////////////////////////////////////////////////
// 到着予想時刻
///////////////////////////////////////////////////////////

const now=
new Date();

const eta=
new Date(
    now.getTime()
    +
    route.duration*1000
);

const etaHour=
eta.getHours()
.toString()
.padStart(2,'0');

const etaMinute=
eta.getMinutes()
.toString()
.padStart(2,'0');

const etaText=
`${etaHour}:${etaMinute}`;

///////////////////////////////////////////////////////////////
// 時間文字列
///////////////////////////////////////////////////////////////

let timeText='';

if(hours>0){

    timeText=
    `${hours}時間 ${minutes}分`;

}else{

    timeText=
    `${minutes}分`;
}

///////////////////////////////////////////////////////////////
// UI表示
///////////////////////////////////////////////////////////////

document.getElementById(
    'routeStats'
).innerHTML=

`
距離: ${km} km

<br>

到着まで: ${timeText}

<br>

到着予定: ${etaText}
`;

`
距離:
${km} km

<br>

到着:
${timeText}
`;

    currentSteps=
    route.legs[0].steps;

    currentStepIndex=0;

    const routeGeoJSON={

        type:'Feature',

        geometry:
        route.geometry
    };

    if(map.getSource('route-source')){

        map.getSource(
            'route-source'
        ).setData(routeGeoJSON);

    }else{

        map.addSource('route-source',{

            type:'geojson',

            data:routeGeoJSON
        });

        map.addLayer({

            id:'route-layer',

            type:'line',

            source:'route-source',

            layout:{

                'line-cap':'round',

                'line-join':'round'
            },

            paint:{

                'line-color':'#00aaff',

                'line-width':7
            }
        });
    }

    const bounds=
    new maplibregl.LngLatBounds();

    routeGeoJSON.geometry.coordinates
    .forEach(coord=>{

        bounds.extend(coord);
    });

    map.fitBounds(bounds,{

        padding:80
    });

    speak('ルート案内を開始します');

    ///////////////////////////////////////////////////////////
    // ナビUI表示
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'carNaviUI'
    ).style.display='flex';

    ///////////////////////////////////////////////////////////
    // routeStats表示
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'routeStats'
    ).style.display='block';
}

///////////////////////////////////////////////////////////////
// ルート削除
///////////////////////////////////////////////////////////////

function clearRoute(){

    if(map.getLayer('route-layer')){

        map.removeLayer('route-layer');
    }

    if(map.getSource('route-source')){

        map.removeSource('route-source');
    }

    if(destinationMarker){

        destinationMarker.remove();

        destinationMarker=null;
    }

    document.getElementById(
        'destinationInput'
    ).value='';

    document.getElementById(
        'nextTurn'
    ).innerText='ナビ待機中';

    document.getElementById(
        'routeStats'
    ).innerHTML=

    `
    距離: -- km<br>
    到着まで: --時間 --分<br>
    到着予定: --:--
    `;

    currentSteps=[];

    currentStepIndex=0;

    speak('ルートを削除しました');

    ///////////////////////////////////////////////////////////
    // ナビUI非表示
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'carNaviUI'
    ).style.display='none';

    ///////////////////////////////////////////////////////////
    // routeStats非表示
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'routeStats'
    ).style.display='none';

}

///////////////////////////////////////////////////////////////
// POI
///////////////////////////////////////////////////////////////

async function loadPOI(){

    const center=
    map.getCenter();

    const query=`

[out:json];

(

node["shop"="convenience"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

node["amenity"="fuel"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

);

out;
`;

    const url=
    "https://overpass-api.de/api/interpreter?data="
    +
    encodeURIComponent(query);

    const res=
    await fetch(url);

    const data=
    await res.json();

    document
    .querySelectorAll('.poi-marker')
    .forEach(el=>el.remove());

    data.elements.forEach(el=>{

        const div=
        document.createElement('div');

        div.className='poi-marker';

        if(el.tags.shop==='convenience'){

            div.innerHTML='🏪';

        }else if(el.tags.amenity==='fuel'){

            div.innerHTML='⛽';
        }

        new maplibregl.Marker({

            element:div
        })

        .setLngLat([el.lon,el.lat])

        .addTo(map);

        div.onclick=()=>{

            const name=
            el.tags.name || '地点';

            const ok=
            confirm(
`${name}

目的地に設定しますか？`
            );

            if(!ok)return;

            setDestinationMarker(
                el.lon,
                el.lat
            );

            speak(
                '目的地を設定しました'
            );
        };
    });
}
