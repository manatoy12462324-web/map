<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>探索型GPSナビ</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

///////////////////////////////////////////////////////////////
// Turf.js（タイル結合用）
///////////////////////////////////////////////////////////////

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

#menuButton{

    position:absolute;

    top:15px;
    left:15px;

    width:55px;
    height:55px;

    z-index:1000;

    border:none;
    border-radius:16px;

    background:rgba(0,0,0,0.85);

    color:white;

    font-size:28px;

    cursor:pointer;
}

#sidebar{

    position:absolute;

    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.96);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;
}

#sidebar.open{
    left:0;
}

.title{

    font-size:18px;

    margin-top:20px;
    margin-bottom:10px;

    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    box-sizing:border-box;

    font-size:16px;
}

button.action{

    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.75);

    color:white;

    padding:10px 14px;

    border-radius:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <button class="action" id="followButton">
        GPS追従 ON
    </button>

    <div class="title">探索ゲーム</div>

    <button class="action" id="gameModeButton">
        ゲームモード OFF
    </button>

    <button class="action" id="resetExploreButton">
        探索データ削除
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map = new maplibregl.Map({

    container:'map',

    style:{
        version:8,

        sources:{

            osm:{
                type:'raster',

                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],

                tileSize:256,

                attribution:'© OpenStreetMap'
            }
        },

        layers:[

            {
                id:'osm',

                type:'raster',

                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],
    zoom:15,
    pitch:60
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

const sidebar =
document.getElementById('sidebar');

document.getElementById('menuButton')
.onclick=()=>{

    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

const userMarker=
new maplibregl.Marker({
    color:'#00aaff'
});

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

let gameMode=false;

///////////////////////////////////////////////////////////////
// タイルサイズ
///////////////////////////////////////////////////////////////

const TILE_SIZE=0.00015;

///////////////////////////////////////////////////////////////
// 保存キー
///////////////////////////////////////////////////////////////

const STORAGE_KEY='explored_tiles_union_v1';

///////////////////////////////////////////////////////////////
// 探索済み
///////////////////////////////////////////////////////////////

let exploredTiles=
loadExploredTiles();

///////////////////////////////////////////////////////////////
// 読み込み
///////////////////////////////////////////////////////////////

function loadExploredTiles(){

    const saved=
        localStorage.getItem(STORAGE_KEY);

    if(saved){

        return JSON.parse(saved);
    }

    return {};
}

///////////////////////////////////////////////////////////////
// 保存
///////////////////////////////////////////////////////////////

function saveExploredTiles(){

    localStorage.setItem(

        STORAGE_KEY,

        JSON.stringify(exploredTiles)
    );
}

///////////////////////////////////////////////////////////////
// タイルID
///////////////////////////////////////////////////////////////

function getTileId(lat,lng){

    const x=
        Math.floor(lng/TILE_SIZE);

    const y=
        Math.floor(lat/TILE_SIZE);

    return `${x}_${y}`;
}

///////////////////////////////////////////////////////////////
// Polygon生成
///////////////////////////////////////////////////////////////

function tileToPolygon(tileId){

    const split=
        tileId.split('_');

    const x=parseInt(split[0]);
    const y=parseInt(split[1]);

    const lng=x*TILE_SIZE;
    const lat=y*TILE_SIZE;

    return [

        [lng,lat],
        [lng+TILE_SIZE,lat],
        [lng+TILE_SIZE,lat+TILE_SIZE],
        [lng,lat+TILE_SIZE],
        [lng,lat]
    ];
}

///////////////////////////////////////////////////////////////
// タイル結合
///////////////////////////////////////////////////////////////

function generateMergedMaskGeoJSON(){

    ///////////////////////////////////////////////////////////
    // 世界全体
    ///////////////////////////////////////////////////////////

    const world=[

        [-180,-85],
        [180,-85],
        [180,85],
        [-180,85],
        [-180,-85]
    ];

    ///////////////////////////////////////////////////////////
    // Polygon配列
    ///////////////////////////////////////////////////////////

    const polygons=[];

    for(const tileId in exploredTiles){

        const poly=
        turf.polygon([

            tileToPolygon(tileId)
        ]);

        polygons.push(poly);
    }

    ///////////////////////////////////////////////////////////
    // Polygonなし
    ///////////////////////////////////////////////////////////

    if(polygons.length===0){

        return {

            type:'FeatureCollection',

            features:[{

                type:'Feature',

                geometry:{

                    type:'Polygon',

                    coordinates:[world]
                }
            }]
        };
    }

    ///////////////////////////////////////////////////////////
    // Turf Union
    ///////////////////////////////////////////////////////////

    let merged=polygons[0];

    for(let i=1;i<polygons.length;i++){

        try{

            merged=
            turf.union(
                merged,
                polygons[i]
            );

        }catch(e){

            console.log(e);
        }
    }

    ///////////////////////////////////////////////////////////
    // MultiPolygon対応
    ///////////////////////////////////////////////////////////

    let holes=[];

    if(merged.geometry.type==='Polygon'){

        holes.push(
            [...merged.geometry.coordinates[0]]
            .reverse()
        );

    }else if(
        merged.geometry.type==='MultiPolygon'
    ){

        for(const poly of merged.geometry.coordinates){

            holes.push(
                [...poly[0]].reverse()
            );
        }
    }

    ///////////////////////////////////////////////////////////
    // 穴あきマスク
    ///////////////////////////////////////////////////////////

    return {

        type:'FeatureCollection',

        features:[{

            type:'Feature',

            geometry:{

                type:'Polygon',

                coordinates:[

                    world,

                    ...holes
                ]
            }
        }]
    };
}

///////////////////////////////////////////////////////////////
// ゲーム更新
///////////////////////////////////////////////////////////////

function updateGameMask(){

    if(map.getSource('mask-source')){

        map.getSource('mask-source')
        .setData(
            generateMergedMaskGeoJSON()
        );
    }

    ///////////////////////////////////////////////////////////
    // 表示切替
    ///////////////////////////////////////////////////////////

    if(gameMode){

        map.setLayoutProperty(
            'mask-layer',
            'visibility',
            'visible'
        );

    }else{

        map.setLayoutProperty(
            'mask-layer',
            'visibility',
            'none'
        );
    }
}

///////////////////////////////////////////////////////////////
// GPS更新
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const lat=
        position.coords.latitude;

    const lng=
        position.coords.longitude;

    const heading=
        position.coords.heading || 0;

    currentPosition=[lng,lat];

    ///////////////////////////////////////////////////////////
    // マーカー
    ///////////////////////////////////////////////////////////

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    ///////////////////////////////////////////////////////////
    // GPS表示
    ///////////////////////////////////////////////////////////

    document.getElementById('gpsInfo')
    .innerText=
    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    ///////////////////////////////////////////////////////////
    // GPS追従
    ///////////////////////////////////////////////////////////

    if(followMode){

        map.easeTo({

            center:currentPosition,

            duration:1000,

            zoom:17,

            pitch:65,

            bearing:heading
        });
    }

    ///////////////////////////////////////////////////////////
    // 探索処理
    ///////////////////////////////////////////////////////////

    const tileId=
        getTileId(lat,lng);

    if(!exploredTiles[tileId]){

        exploredTiles[tileId]=true;

        saveExploredTiles();

        updateGameMask();
    }
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

navigator.geolocation.watchPosition(

(position)=>{

    updateGPS(position);

},

(err)=>{

    console.log(err);

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
});

///////////////////////////////////////////////////////////////
// 地図ロード
///////////////////////////////////////////////////////////////

map.on('load',()=>{

    ///////////////////////////////////////////////////////////
    // マスクソース
    ///////////////////////////////////////////////////////////

    map.addSource('mask-source',{

        type:'geojson',

        data:
        generateMergedMaskGeoJSON()
    });

    ///////////////////////////////////////////////////////////
    // 黒マスク
    ///////////////////////////////////////////////////////////

    map.addLayer({

        id:'mask-layer',

        type:'fill',

        source:'mask-source',

        paint:{

            ///////////////////////////////////////////////////
            // 黒
            ///////////////////////////////////////////////////

            'fill-color':'black',

            ///////////////////////////////////////////////////
            // 暗さ
            ///////////////////////////////////////////////////

            'fill-opacity':0.96
        }
    });

    ///////////////////////////////////////////////////////////
    // 初期非表示
    ///////////////////////////////////////////////////////////

    map.setLayoutProperty(
        'mask-layer',
        'visibility',
        'none'
    );
});

///////////////////////////////////////////////////////////////
// GPS追従
///////////////////////////////////////////////////////////////

document.getElementById('followButton')
.onclick=()=>{

    followMode=!followMode;

    document.getElementById(
        'followButton'
    ).innerText=

    followMode
    ?
    'GPS追従 ON'
    :
    'GPS追従 OFF';
};

///////////////////////////////////////////////////////////////
// 現在地
///////////////////////////////////////////////////////////////

document.getElementById('gpsButton')
.onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({

        center:currentPosition,
        zoom:17
    });
};

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

document.getElementById('gameModeButton')
.onclick=()=>{

    gameMode=!gameMode;

    updateGameMask();

    document.getElementById(
        'gameModeButton'
    ).innerText=

    gameMode
    ?
    'ゲームモード ON'
    :
    'ゲームモード OFF';
};

///////////////////////////////////////////////////////////////
// 探索削除
///////////////////////////////////////////////////////////////

document.getElementById('resetExploreButton')
.onclick=()=>{

    const ok=
    confirm(
        '探索データを削除しますか？'
    );

    if(!ok)return;

    exploredTiles={};

    saveExploredTiles();

    updateGameMask();
};

///////////////////////////////////////////////////////////////
// HTTPS警告
///////////////////////////////////////////////////////////////

if(location.protocol!=='https:'){

    alert(
`iPhoneでGPSを使うにはHTTPSが必要です。

GitHub Pagesなどで公開してください。`
    );
}

</script>

</body>
</html>
