<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS対応 GPSナビMAP</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet Routing Machine -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #111;
      color: white;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: calc(100% - 20px);
      max-width: 420px;
      background: rgba(0, 0, 0, 0.85);
      padding: 14px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #0a84ff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    #info {
      font-size: 14px;
      line-height: 1.5;
    }

    .leaflet-routing-container {
      max-height: 250px;
      overflow-y: auto;
      border-radius: 12px;
    }

    @media (max-width: 600px) {
      .ui {
        width: calc(100% - 16px);
        left: 8px;
        top: 8px;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="title">🚗 高機能 GPSカーナビ</div>

    <input
      type="text"
      id="destination"
      placeholder="目的地を入力（例：京都駅）"
    />

    <button onclick="startNavigation()">ナビ開始</button>
    <button onclick="moveToCurrentLocation()">現在地へ移動</button>
    <button onclick="toggleFollowMode()">追尾モード: ON</button>
    <button onclick="startVoiceNavigation()">音声ナビ開始</button>

    <div id="info">
      GPS待機中...
    </div>
  </div>

  <div id="map"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Routing -->
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

  <script>
    let map;
    let userMarker;
    let routingControl;
    let followMode = true;
    let voiceEnabled = false;
    let destinationLat = null;
    let destinationLng = null;
    let currentLat = 35.0116;
    let currentLng = 135.7681;

    // 地図初期化
    map = L.map('map').setView([currentLat, currentLng], 15);

    // OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 現在地マーカー
    userMarker = L.marker([currentLat, currentLng])
      .addTo(map)
      .bindPopup('現在地')
      .openPopup();

    // GPS監視
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        (position) => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;

          userMarker.setLatLng([currentLat, currentLng]);

          if (followMode) {
            map.setView([currentLat, currentLng]);
          }

          // 音声ナビ
          if (voiceEnabled && destinationLat && destinationLng) {
            const distance = getDistance(
              currentLat,
              currentLng,
              destinationLat,
              destinationLng
            );

            if (distance < 100) {
              speak('まもなく目的地です');
            }
          }

          document.getElementById('info').innerHTML = `
            緯度: ${currentLat.toFixed(6)}<br>
            経度: ${currentLng.toFixed(6)}<br>
            精度: ${position.coords.accuracy.toFixed(1)} m
          `;
        },
        (error) => {
          console.error(error);

          let message = 'GPS取得失敗';

          switch(error.code) {
            case error.PERMISSION_DENIED:
              message = '位置情報の許可が拒否されました';
              break;
            case error.POSITION_UNAVAILABLE:
              message = '位置情報を取得できません';
              break;
            case error.TIMEOUT:
              message = 'GPS取得タイムアウト';
              break;
          }

          document.getElementById('info').innerHTML = message;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    } else {
      alert('このブラウザはGPSに対応していません');
    }

    // 追尾モード切替
    function toggleFollowMode() {
      followMode = !followMode;

      document.querySelectorAll('button')[1].innerText =
        `追尾モード: ${followMode ? 'ON' : 'OFF'}`;
    }

    // 音声ナビ開始
    function startVoiceNavigation() {
      voiceEnabled = true;
      speak('音声ナビを開始します');
    }

    // 音声読み上げ
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      speechSynthesis.speak(utterance);
    }

    // 2点間距離計算
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    // 現在地へ移動
    function moveToCurrentLocation() {
      map.setView([currentLat, currentLng], 17);
    }

    // ナビ開始
    async function startNavigation() {
      const destination = document.getElementById('destination').value;

      if (!destination) {
        alert('目的地を入力してください');
        return;
      }

      try {
        // Nominatim APIで住所検索
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destination)}`
        );

        const data = await response.json();

        if (data.length === 0) {
          alert('目的地が見つかりません');
          return;
        }

        const destLat = parseFloat(data[0].lat);
        const destLng = parseFloat(data[0].lon);

        destinationLat = destLat;
        destinationLng = destLng;

        speak('ルート案内を開始します');

        // 既存ルート削除
        if (routingControl) {
          map.removeControl(routingControl);
        }

        // ルート表示（できるだけ大通り優先）
        // OSRMの車ルートを使用
        routingControl = L.Routing.control({
          waypoints: [
            L.latLng(currentLat, currentLng),
            L.latLng(destLat, destLng)
          ],
          routeWhileDragging: false,
          addWaypoints: false,
          draggableWaypoints: false,
          fitSelectedRoutes: true,
          showAlternatives: false,
          router: L.Routing.osrmv1({
            serviceUrl: 'https://router.project-osrm.org/route/v1',
            profile: 'driving',
            language: 'ja'
          }),
          lineOptions: {
            styles: [{ color: '#0a84ff', opacity: 0.9, weight: 7 }]
          },
          preferences: {
            highways: true
          },
          createMarker: function(i, wp) {
            if (i === 0) {
              return L.marker(wp.latLng).bindPopup('現在地');
            } else {
              return L.marker(wp.latLng).bindPopup('目的地');
            }
          }
        }).addTo(map);

      } catch (err) {
        console.error(err);
        alert('ナビ開始に失敗しました');
      }
    }
  </script>
</body>
</html>
