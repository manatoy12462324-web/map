<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>探索型GPSナビ Ultimate+</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

#menuButton{

    position:absolute;

    top:15px;
    left:15px;

    width:55px;
    height:55px;

    border:none;

    border-radius:16px;

    background:rgba(0,0,0,0.85);

    color:white;

    font-size:28px;

    z-index:1000;

    cursor:pointer;
}

#sidebar{

    position:absolute;

    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.97);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;
}

#sidebar.open{
    left:0;
}

.title{

    margin-top:20px;
    margin-bottom:10px;

    font-size:18px;

    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    box-sizing:border-box;

    font-size:16px;
}

button.action{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.8);

    color:white;

    padding:12px;

    border-radius:12px;

    min-width:220px;
}

#navPanel{

    position:absolute;

    top:15px;
    left:50%;

    transform:translateX(-50%);

    z-index:1000;

    background:rgba(0,0,0,0.85);

    color:white;

    padding:14px 20px;

    border-radius:18px;

    min-width:280px;

    text-align:center;
}

#speedLimit{

    position:absolute;

    right:15px;
    top:15px;

    width:80px;
    height:80px;

    background:white;

    border:8px solid red;

    border-radius:50%;

    z-index:1000;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    font-weight:bold;

    color:black;
}

.poi-marker{

    font-size:28px;

    cursor:pointer;

    user-select:none;
}

.friend-marker{

    width:18px;
    height:18px;

    background:#00ff88;

    border-radius:50%;

    border:3px solid white;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="navPanel">

    <div id="nextInstruction">
        ナビ待機中
    </div>

    <div id="routeStats">

        距離: -- km<br>
        到着: -- 分

    </div>

</div>

<div id="speedLimit">
    50
</div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <button class="action" id="followButton">
        GPS追従 ON
    </button>

    <button class="action" id="bearingModeButton">
        進行方向固定
    </button>

    <button class="action" id="viewModeButton">
        3D表示
    </button>

    <div class="title">ナビ</div>

    <input
    id="destinationInput"
    placeholder="緯度,経度"
    />

    <button class="action" id="routeButton">
        ルート開始
    </button>

    <button class="action" id="clearRouteButton">
        目的地＆ルート消去
    </button>

    <button class="action" id="modeButton">
        車モード
    </button>

    <button class="action" id="selectDestinationButton">
        地図タップ選択 OFF
    </button>

    <button class="action" id="tollButton">
        有料道路 ON
    </button>

    <div class="title">探索ゲーム</div>

    <button class="action" id="gameModeButton">
        ゲームモード OFF
    </button>

    <button class="action" id="resetExploreButton">
        探索データ削除
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map=new maplibregl.Map({

    container:'map',

    style:{

        version:8,

        sources:{

            osm:{

                type:'raster',

                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],

                tileSize:256,

                attribution:'© OpenStreetMap'
            }
        },

        layers:[

            {

                id:'osm',

                type:'raster',

                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],

    zoom:16,

    pitch:60
});

///////////////////////////////////////////////////////////////
// 状態
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

let northUp=false;

let topView=false;

let navigationMode='driving';

let selectDestinationMode=false;

let destinationMarker=null;

let gameMode=false;

let useToll=true;

let currentSteps=[];

///////////////////////////////////////////////////////////////
// 探索ゲーム
///////////////////////////////////////////////////////////////

const TILE_SIZE=0.00015;

const STORAGE_KEY='explored_tiles_union_v1';

let exploredTiles=
JSON.parse(
localStorage.getItem(STORAGE_KEY)
|| '{}'
);

///////////////////////////////////////////////////////////////
// マーカー
///////////////////////////////////////////////////////////////

const navDiv=
document.createElement('div');

navDiv.style.width='42px';
navDiv.style.height='42px';

navDiv.style.background=
'url(https://cdn-icons-png.flaticon.com/512/684/684908.png)';

navDiv.style.backgroundSize='contain';

const userMarker=
new maplibregl.Marker({

    element:navDiv
});

///////////////////////////////////////////////////////////////
// 音声
///////////////////////////////////////////////////////////////

function speak(text){

    speechSynthesis.speak(
        new SpeechSynthesisUtterance(text)
    );
}

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const lat=
    position.coords.latitude;

    const lng=
    position.coords.longitude;

    const heading=
    position.coords.heading || 0;

    currentPosition=[lng,lat];

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    navDiv.style.transform=
    `rotate(${heading}deg)`;

    ///////////////////////////////////////////////////////////
    // GPS情報
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'gpsInfo'
    ).innerHTML=

`
GPS:
${lat.toFixed(5)},
${lng.toFixed(5)}
`;

    ///////////////////////////////////////////////////////////
    // 制限速度（簡易）
    ///////////////////////////////////////////////////////////

    document.getElementById(
        'speedLimit'
    ).innerText='50';

    ///////////////////////////////////////////////////////////
    // GPS追従
    ///////////////////////////////////////////////////////////

    if(followMode){

        map.easeTo({

            center:currentPosition,

            zoom:map.getZoom(),

            pitch:
            topView
            ?
            0
            :
            60,

            bearing:
            northUp
            ?
            0
            :
            heading,

            duration:1000
        });
    }

    ///////////////////////////////////////////////////////////
    // 次案内
    ///////////////////////////////////////////////////////////

    if(currentSteps.length){

        const step=currentSteps[0];

        if(step){

            document.getElementById(
                'nextInstruction'
            ).innerHTML=

`
次:
${step.maneuver.instruction}
`;

        }
    }

    ///////////////////////////////////////////////////////////
    // 探索
    ///////////////////////////////////////////////////////////

    const tileId=
    getTileId(lat,lng);

    if(!exploredTiles[tileId]){

        exploredTiles[tileId]=true;

        localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify(exploredTiles)
        );

        updateGameMask();
    }
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

navigator.geolocation.watchPosition(

updateGPS,

console.log,

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
});

///////////////////////////////////////////////////////////////
// タイル
///////////////////////////////////////////////////////////////

function getTileId(lat,lng){

    const x=
    Math.floor(lng/TILE_SIZE);

    const y=
    Math.floor(lat/TILE_SIZE);

    return `${x}_${y}`;
}

///////////////////////////////////////////////////////////////
// Polygon
///////////////////////////////////////////////////////////////

function tileToPolygon(tileId){

    const split=
    tileId.split('_');

    const x=parseInt(split[0]);
    const y=parseInt(split[1]);

    const lng=x*TILE_SIZE;
    const lat=y*TILE_SIZE;

    return [

        [lng,lat],
        [lng+TILE_SIZE,lat],
        [lng+TILE_SIZE,lat+TILE_SIZE],
        [lng,lat+TILE_SIZE],
        [lng,lat]
    ];
}

///////////////////////////////////////////////////////////////
// マスク
///////////////////////////////////////////////////////////////

function generateMergedMaskGeoJSON(){

    const world=[

        [-180,-85],
        [180,-85],
        [180,85],
        [-180,85],
        [-180,-85]
    ];

    const polygons=[];

    for(const tileId in exploredTiles){

        polygons.push(

            turf.polygon([
                tileToPolygon(tileId)
            ])
        );
    }

    if(polygons.length===0){

        return {

            type:'FeatureCollection',

            features:[{

                type:'Feature',

                geometry:{

                    type:'Polygon',

                    coordinates:[world]
                }
            }]
        };
    }

    let merged=polygons[0];

    for(let i=1;i<polygons.length;i++){

        try{

            merged=
            turf.union(
                merged,
                polygons[i]
            );

        }catch(e){}
    }

    let holes=[];

    if(
        merged.geometry.type==='Polygon'
    ){

        holes.push(
            [...merged.geometry.coordinates[0]]
            .reverse()
        );
    }

    return {

        type:'FeatureCollection',

        features:[{

            type:'Feature',

            geometry:{

                type:'Polygon',

                coordinates:[

                    world,
                    ...holes
                ]
            }
        }]
    };
}

///////////////////////////////////////////////////////////////
// 更新
///////////////////////////////////////////////////////////////

function updateGameMask(){

    if(map.getSource('mask-source')){

        map.getSource('mask-source')
        .setData(
            generateMergedMaskGeoJSON()
        );
    }

    map.setLayoutProperty(

        'mask-layer',

        'visibility',

        gameMode
        ?
        'visible'
        :
        'none'
    );
}

///////////////////////////////////////////////////////////////
// 目的地
///////////////////////////////////////////////////////////////

function setDestinationMarker(lng,lat){

    if(destinationMarker){

        destinationMarker.remove();
    }

    destinationMarker=
    new maplibregl.Marker({

        color:'#ff3333'
    })

    .setLngLat([lng,lat])

    .addTo(map);

    document.getElementById(
        'destinationInput'
    ).value=

    `${lat},${lng}`;
}

///////////////////////////////////////////////////////////////
// 地図タップ
///////////////////////////////////////////////////////////////

map.on('click',(e)=>{

    if(!selectDestinationMode)return;

    setDestinationMarker(

        e.lngLat.lng,
        e.lngLat.lat
    );
});

///////////////////////////////////////////////////////////////
// ルート
///////////////////////////////////////////////////////////////

async function startRoute(){

    if(!currentPosition)return;

    const input=
    document.getElementById(
        'destinationInput'
    ).value;

    const split=input.split(',');

    const lat=
    parseFloat(split[0]);

    const lng=
    parseFloat(split[1]);

    const profile=
    navigationMode==='walking'
    ?
    'foot'
    :
    'driving';

    const url=
`https://router.project-osrm.org/route/v1/${profile}/${currentPosition[0]},${currentPosition[1]};${lng},${lat}?overview=full&geometries=geojson&steps=true`;

    const res=
    await fetch(url);

    const data=
    await res.json();

    const route=
    data.routes[0];

    currentSteps=
    route.legs[0].steps;

    ///////////////////////////////////////////////////////////
    // 距離時間
    ///////////////////////////////////////////////////////////

    const distance=
    (route.distance/1000)
    .toFixed(1);

    const duration=
    Math.round(
        route.duration/60
    );

    document.getElementById(
        'routeStats'
    ).innerHTML=

`
距離:
${distance} km

<br>

到着:
${duration} 分
`;

    ///////////////////////////////////////////////////////////
    // ルート
    ///////////////////////////////////////////////////////////

    const geojson={

        type:'Feature',

        geometry:
        route.geometry
    };

    if(map.getSource('route-source')){

        map.getSource(
            'route-source'
        ).setData(geojson);

    }else{

        map.addSource('route-source',{

            type:'geojson',

            data:geojson
        });

        map.addLayer({

            id:'route-layer',

            type:'line',

            source:'route-source',

            paint:{

                'line-color':'#00aaff',

                'line-width':8
            }
        });
    }

    speak('ルート案内開始');
}

///////////////////////////////////////////////////////////////
// ルート削除
///////////////////////////////////////////////////////////////

function clearRoute(){

    if(map.getLayer('route-layer')){

        map.removeLayer('route-layer');
    }

    if(map.getSource('route-source')){

        map.removeSource('route-source');
    }

    currentSteps=[];

    document.getElementById(
        'routeStats'
    ).innerHTML=

`
距離: -- km<br>
到着: -- 分
`;

    document.getElementById(
        'nextInstruction'
    ).innerText=

    'ナビ待機中';
}

///////////////////////////////////////////////////////////////
// POI
///////////////////////////////////////////////////////////////

async function loadPOI(){

    const center=
    map.getCenter();

    const query=`

[out:json];

(

node["shop"="convenience"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

node["amenity"="fuel"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

);

out;
`;

    const url=
    "https://overpass-api.de/api/interpreter?data="
    +
    encodeURIComponent(query);

    const res=
    await fetch(url);

    const data=
    await res.json();

    document
    .querySelectorAll('.poi-marker')
    .forEach(el=>el.remove());

    data.elements.forEach(el=>{

        const div=
        document.createElement('div');

        div.className='poi-marker';

        if(el.tags.shop==='convenience'){

            div.innerHTML='🏪';

        }else{

            div.innerHTML='⛽';
        }

        new maplibregl.Marker({

            element:div
        })

        .setLngLat([el.lon,el.lat])

        .addTo(map);

        div.onclick=()=>{

            const ok=
            confirm(
                '目的地に設定しますか？'
            );

            if(!ok)return;

            setDestinationMarker(
                el.lon,
                el.lat
            );
        };
    });
}

///////////////////////////////////////////////////////////////
// 友達表示（簡易）
///////////////////////////////////////////////////////////////

function loadFriendMarker(){

    const div=
    document.createElement('div');

    div.className='friend-marker';

    new maplibregl.Marker({

        element:div
    })

    .setLngLat([
        135.7700,
        35.0125
    ])

    .addTo(map);
}

///////////////////////////////////////////////////////////////
// 地図ロード
///////////////////////////////////////////////////////////////

map.on('load',()=>{

    ///////////////////////////////////////////////////////////
    // マスク
    ///////////////////////////////////////////////////////////

    map.addSource('mask-source',{

        type:'geojson',

        data:
        generateMergedMaskGeoJSON()
    });

    map.addLayer({

        id:'mask-layer',

        type:'fill',

        source:'mask-source',

        paint:{

            'fill-color':'black',

            'fill-opacity':0.96
        }
    });

    map.setLayoutProperty(

        'mask-layer',

        'visibility',

        'none'
    );

    ///////////////////////////////////////////////////////////
    // POI
    ///////////////////////////////////////////////////////////

    loadPOI();

    ///////////////////////////////////////////////////////////
    // 友達
    ///////////////////////////////////////////////////////////

    loadFriendMarker();
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

document.getElementById(
'menuButton'
).onclick=()=>{

    document.getElementById(
        'sidebar'
    ).classList.toggle('open');
};

///////////////////////////////////////////////////////////////

document.getElementById(
'followButton'
).onclick=()=>{

    followMode=!followMode;

    document.getElementById(
        'followButton'
    ).innerText=

    followMode
    ?
    'GPS追従 ON'
    :
    'GPS追従 OFF';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'gpsButton'
).onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({

        center:currentPosition,

        zoom:17
    });
};

///////////////////////////////////////////////////////////////

document.getElementById(
'bearingModeButton'
).onclick=()=>{

    northUp=!northUp;

    document.getElementById(
        'bearingModeButton'
    ).innerText=

    northUp
    ?
    '北固定'
    :
    '進行方向固定';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'viewModeButton'
).onclick=()=>{

    topView=!topView;

    map.easeTo({

        pitch:
        topView
        ?
        0
        :
        60
    });
};

///////////////////////////////////////////////////////////////

document.getElementById(
'routeButton'
).onclick=()=>{

    startRoute();
};

///////////////////////////////////////////////////////////////

document.getElementById(
'clearRouteButton'
).onclick=()=>{

    clearRoute();
};

///////////////////////////////////////////////////////////////

document.getElementById(
'modeButton'
).onclick=()=>{

    navigationMode=

    navigationMode==='driving'
    ?
    'walking'
    :
    'driving';

    document.getElementById(
        'modeButton'
    ).innerText=

    navigationMode==='driving'
    ?
    '車モード'
    :
    '徒歩モード';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'selectDestinationButton'
).onclick=()=>{

    selectDestinationMode=
    !selectDestinationMode;

    document.getElementById(
        'selectDestinationButton'
    ).innerText=

    selectDestinationMode
    ?
    '地図タップ選択 ON'
    :
    '地図タップ選択 OFF';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'tollButton'
).onclick=()=>{

    useToll=!useToll;

    document.getElementById(
        'tollButton'
    ).innerText=

    useToll
    ?
    '有料道路 ON'
    :
    '有料道路 OFF';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'gameModeButton'
).onclick=()=>{

    gameMode=!gameMode;

    updateGameMask();

    document.getElementById(
        'gameModeButton'
    ).innerText=

    gameMode
    ?
    'ゲームモード ON'
    :
    'ゲームモード OFF';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'resetExploreButton'
).onclick=()=>{

    exploredTiles={};

    localStorage.setItem(
        STORAGE_KEY,
        '{}'
    );

    updateGameMask();
};

</script>

</body>
</html>
