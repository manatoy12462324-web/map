<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>探索型GPSナビ Ultimate</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

#menuButton{

    position:absolute;

    top:15px;
    left:15px;

    width:55px;
    height:55px;

    border:none;

    border-radius:16px;

    background:rgba(0,0,0,0.85);

    color:white;

    font-size:28px;

    z-index:1000;

    cursor:pointer;
}

#sidebar{

    position:absolute;

    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.97);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;
}

#sidebar.open{
    left:0;
}

.title{

    margin-top:20px;
    margin-bottom:10px;

    font-size:18px;

    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    box-sizing:border-box;

    font-size:16px;
}

button.action{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.75);

    color:white;

    padding:10px 14px;

    border-radius:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <button class="action" id="followButton">
        GPS追従 ON
    </button>

    <button class="action" id="bearingModeButton">
        進行方向固定
    </button>

    <button class="action" id="viewModeButton">
        3D表示
    </button>

    <button class="action" id="darkModeButton">
        ダークモード ON
    </button>

    <div class="title">ナビ</div>

    <input
    id="destinationInput"
    placeholder="目的地 緯度,経度"
    />

    <button class="action" id="routeButton">
        ルート開始
    </button>

    <button class="action" id="modeButton">
        車モード
    </button>

    <div class="title">探索ゲーム</div>

    <button class="action" id="gameModeButton">
        ゲームモード OFF
    </button>

    <button class="action" id="resetExploreButton">
        探索データ削除
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map = new maplibregl.Map({

    container:'map',

    style:{

        version:8,

        sources:{

            osm:{

                type:'raster',

                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],

                tileSize:256,

                attribution:'© OpenStreetMap'
            }
        },

        layers:[

            {
                id:'osm',

                type:'raster',

                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],

    zoom:16,

    pitch:65
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

const sidebar=
document.getElementById('sidebar');

document.getElementById(
'menuButton'
).onclick=()=>{

    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

let northUp=false;

let topView=false;

let darkMode=true;

///////////////////////////////////////////////////////////////
// ナビ
///////////////////////////////////////////////////////////////

let navigationMode='driving';

///////////////////////////////////////////////////////////////
// ナビ風マーカー
///////////////////////////////////////////////////////////////

const navMarker=document.createElement('div');

navMarker.style.width='40px';
navMarker.style.height='40px';

navMarker.style.background=
'url(https://cdn-icons-png.flaticon.com/512/684/684908.png)';

navMarker.style.backgroundSize='contain';

navMarker.style.backgroundRepeat='no-repeat';

const userMarker=
new maplibregl.Marker({

    element:navMarker
});

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

let gameMode=false;

const TILE_SIZE=0.00015;

const STORAGE_KEY='explored_tiles_union_v1';

let exploredTiles=
loadExploredTiles();

///////////////////////////////////////////////////////////////
// 保存
///////////////////////////////////////////////////////////////

function loadExploredTiles(){

    const saved=
    localStorage.getItem(STORAGE_KEY);

    if(saved){

        return JSON.parse(saved);
    }

    return {};
}

function saveExploredTiles(){

    localStorage.setItem(

        STORAGE_KEY,

        JSON.stringify(exploredTiles)
    );
}

///////////////////////////////////////////////////////////////
// タイル
///////////////////////////////////////////////////////////////

function getTileId(lat,lng){

    const x=
    Math.floor(lng/TILE_SIZE);

    const y=
    Math.floor(lat/TILE_SIZE);

    return `${x}_${y}`;
}

function tileToPolygon(tileId){

    const split=
    tileId.split('_');

    const x=parseInt(split[0]);
    const y=parseInt(split[1]);

    const lng=x*TILE_SIZE;
    const lat=y*TILE_SIZE;

    return [

        [lng,lat],
        [lng+TILE_SIZE,lat],
        [lng+TILE_SIZE,lat+TILE_SIZE],
        [lng,lat+TILE_SIZE],
        [lng,lat]
    ];
}

///////////////////////////////////////////////////////////////
// マスク生成
///////////////////////////////////////////////////////////////

function generateMergedMaskGeoJSON(){

    const world=[

        [-180,-85],
        [180,-85],
        [180,85],
        [-180,85],
        [-180,-85]
    ];

    const polygons=[];

    for(const tileId in exploredTiles){

        polygons.push(

            turf.polygon([
                tileToPolygon(tileId)
            ])
        );
    }

    if(polygons.length===0){

        return {

            type:'FeatureCollection',

            features:[{

                type:'Feature',

                geometry:{
                    type:'Polygon',
                    coordinates:[world]
                }
            }]
        };
    }

    let merged=polygons[0];

    for(let i=1;i<polygons.length;i++){

        try{

            merged=
            turf.union(
                merged,
                polygons[i]
            );

        }catch(e){

            console.log(e);
        }
    }

    let holes=[];

    if(
        merged.geometry.type==='Polygon'
    ){

        holes.push(

            [...merged.geometry.coordinates[0]]
            .reverse()
        );
    }

    else if(
        merged.geometry.type==='MultiPolygon'
    ){

        for(const poly of merged.geometry.coordinates){

            holes.push(
                [...poly[0]].reverse()
            );
        }
    }

    return {

        type:'FeatureCollection',

        features:[{

            type:'Feature',

            geometry:{

                type:'Polygon',

                coordinates:[

                    world,
                    ...holes
                ]
            }
        }]
    };
}

///////////////////////////////////////////////////////////////
// マスク更新
///////////////////////////////////////////////////////////////

function updateGameMask(){

    if(map.getSource('mask-source')){

        map.getSource('mask-source')
        .setData(
            generateMergedMaskGeoJSON()
        );
    }

    map.setLayoutProperty(

        'mask-layer',

        'visibility',

        gameMode
        ?
        'visible'
        :
        'none'
    );
}

///////////////////////////////////////////////////////////////
// 音声
///////////////////////////////////////////////////////////////

function speak(text){

    const utter=
    new SpeechSynthesisUtterance(text);

    utter.lang='ja-JP';

    speechSynthesis.speak(utter);
}

///////////////////////////////////////////////////////////////
// POI
///////////////////////////////////////////////////////////////

async function loadPOI(){

    const center=map.getCenter();

    const query=`

    [out:json];

    (

      node["shop"="convenience"]
      (${center.lat-0.02},
       ${center.lng-0.02},
       ${center.lat+0.02},
       ${center.lng+0.02});

    );

    out;
    `;

    const url=
    "https://overpass-api.de/api/interpreter?data="
    +
    encodeURIComponent(query);

    const res=await fetch(url);

    const data=await res.json();

    const features=
    data.elements.map(el=>({

        type:'Feature',

        geometry:{
            type:'Point',
            coordinates:[el.lon,el.lat]
        },

        properties:{
            name:el.tags.name || 'コンビニ'
        }
    }));

    if(map.getSource('poi-source')){

        map.getSource('poi-source')
        .setData({

            type:'FeatureCollection',

            features
        });

        return;
    }

    map.addSource('poi-source',{

        type:'geojson',

        data:{

            type:'FeatureCollection',

            features
        }
    });

    map.addLayer({

        id:'poi-layer',

        type:'circle',

        source:'poi-source',

        paint:{

            'circle-radius':6,

            'circle-color':'#00ff88'
        }
    });
}

///////////////////////////////////////////////////////////////
// ルート
///////////////////////////////////////////////////////////////

async function startRoute(){

    if(!currentPosition)return;

    const input=
    document.getElementById(
        'destinationInput'
    ).value;

    const split=input.split(',');

    const destLat=
    parseFloat(split[0]);

    const destLng=
    parseFloat(split[1]);

    const profile=
    navigationMode==='walking'
    ?
    'foot'
    :
    'driving';

    const url=
`https://router.project-osrm.org/route/v1/${profile}/
${currentPosition[0]},${currentPosition[1]};
${destLng},${destLat}
?overview=full&geometries=geojson`;

    const res=await fetch(url);

    const data=await res.json();

    const route={

        type:'Feature',

        geometry:data.routes[0].geometry
    };

    if(map.getSource('route-source')){

        map.getSource('route-source')
        .setData(route);

    }else{

        map.addSource('route-source',{

            type:'geojson',

            data:route
        });

        map.addLayer({

            id:'route-layer',

            type:'line',

            source:'route-source',

            paint:{

                'line-width':6,

                'line-color':'#00aaff'
            }
        });
    }

    speak('ルート案内を開始します');
}

///////////////////////////////////////////////////////////////
// GPS更新
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const lat=
    position.coords.latitude;

    const lng=
    position.coords.longitude;

    const heading=
    position.coords.heading || 0;

    currentPosition=[lng,lat];

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    navMarker.style.transform=
    `rotate(${heading}deg)`;

    document.getElementById(
        'gpsInfo'
    ).innerText=

    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    if(followMode){

        map.easeTo({

            center:currentPosition,

            duration:1000,

            zoom:map.getZoom(),

            pitch:topView ? 0 : 65,

            bearing:
            northUp
            ?
            0
            :
            heading
        });
    }

    const tileId=
    getTileId(lat,lng);

    if(!exploredTiles[tileId]){

        exploredTiles[tileId]=true;

        saveExploredTiles();

        updateGameMask();
    }
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

navigator.geolocation.watchPosition(

(position)=>{

    updateGPS(position);

},

(err)=>{

    console.log(err);

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
});

///////////////////////////////////////////////////////////////
// 地図ロード
///////////////////////////////////////////////////////////////

map.on('load',()=>{

    map.addSource('mask-source',{

        type:'geojson',

        data:
        generateMergedMaskGeoJSON()
    });

    map.addLayer({

        id:'mask-layer',

        type:'fill',

        source:'mask-source',

        paint:{

            'fill-color':'black',

            'fill-opacity':0.96
        }
    });

    map.setLayoutProperty(

        'mask-layer',

        'visibility',

        'none'
    );

    loadPOI();
});

///////////////////////////////////////////////////////////////
// GPS追従
///////////////////////////////////////////////////////////////

document.getElementById(
'followButton'
).onclick=()=>{

    followMode=!followMode;

    document.getElementById(
        'followButton'
    ).innerText=

    followMode
    ?
    'GPS追従 ON'
    :
    'GPS追従 OFF';
};

///////////////////////////////////////////////////////////////
// 現在地
///////////////////////////////////////////////////////////////

document.getElementById(
'gpsButton'
).onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({

        center:currentPosition,

        zoom:17
    });
};

///////////////////////////////////////////////////////////////
// 北固定
///////////////////////////////////////////////////////////////

document.getElementById(
'bearingModeButton'
).onclick=()=>{

    northUp=!northUp;

    document.getElementById(
    'bearingModeButton'
    ).innerText=

    northUp
    ?
    '北固定'
    :
    '進行方向固定';
};

///////////////////////////////////////////////////////////////
// 真上表示
///////////////////////////////////////////////////////////////

document.getElementById(
'viewModeButton'
).onclick=()=>{

    topView=!topView;

    map.easeTo({

        pitch:
        topView
        ?
        0
        :
        65,

        duration:1000
    });

    document.getElementById(
    'viewModeButton'
    ).innerText=

    topView
    ?
    '真上表示'
    :
    '3D表示';
};

///////////////////////////////////////////////////////////////
// ダークモード
///////////////////////////////////////////////////////////////

document.getElementById(
'darkModeButton'
).onclick=()=>{

    darkMode=!darkMode;

    map.setPaintProperty(

        'osm',

        'raster-brightness-max',

        darkMode
        ?
        0.4
        :
        1
    );

    document.getElementById(
    'darkModeButton'
    ).innerText=

    darkMode
    ?
    'ダークモード ON'
    :
    'ダークモード OFF';
};

///////////////////////////////////////////////////////////////
// ナビ
///////////////////////////////////////////////////////////////

document.getElementById(
'routeButton'
).onclick=()=>{

    startRoute();
};

document.getElementById(
'modeButton'
).onclick=()=>{

    navigationMode=

    navigationMode==='driving'
    ?
    'walking'
    :
    'driving';

    document.getElementById(
        'modeButton'
    ).innerText=

    navigationMode==='driving'
    ?
    '車モード'
    :
    '徒歩モード';
};

///////////////////////////////////////////////////////////////
// ゲームモード
///////////////////////////////////////////////////////////////

document.getElementById(
'gameModeButton'
).onclick=()=>{

    gameMode=!gameMode;

    updateGameMask();

    document.getElementById(
        'gameModeButton'
    ).innerText=

    gameMode
    ?
    'ゲームモード ON'
    :
    'ゲームモード OFF';
};

///////////////////////////////////////////////////////////////
// 探索削除
///////////////////////////////////////////////////////////////

document.getElementById(
'resetExploreButton'
).onclick=()=>{

    const ok=
    confirm(
        '探索データを削除しますか？'
    );

    if(!ok)return;

    exploredTiles={};

    saveExploredTiles();

    updateGameMask();
};

///////////////////////////////////////////////////////////////
// HTTPS警告
///////////////////////////////////////////////////////////////

if(location.protocol!=='https:'){

    alert(
`iPhoneでGPSを使うにはHTTPSが必要です。

GitHub Pagesなどで公開してください。`
    );
}

</script>

</body>
</html>
