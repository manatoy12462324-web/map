<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>探索型GPSナビ Ultimate+</title>

<link
href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
rel="stylesheet"
/>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

#menuButton{

    position:absolute;

    top:15px;
    left:15px;

    width:55px;
    height:55px;

    border:none;

    border-radius:16px;

    background:rgba(0,0,0,0.85);

    color:white;

    font-size:28px;

    z-index:1000;

    cursor:pointer;
}

#sidebar{

    position:absolute;

    top:0;
    left:-340px;

    width:320px;
    height:100%;

    background:rgba(10,10,10,0.97);

    z-index:999;

    transition:0.3s;

    padding:80px 20px 20px;

    box-sizing:border-box;

    overflow-y:auto;

    color:white;
}

#sidebar.open{
    left:0;
}

.title{

    margin-top:20px;
    margin-bottom:10px;

    font-size:18px;

    font-weight:bold;
}

input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    box-sizing:border-box;

    font-size:16px;
}

button.action{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-bottom:10px;

    background:#2196f3;

    color:white;

    font-size:16px;

    cursor:pointer;
}

#gpsInfo{

    position:absolute;

    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.75);

    color:white;

    padding:10px 14px;

    border-radius:12px;
}

.poiLabel{

    color:white;

    font-size:12px;

    font-weight:bold;

    text-shadow:0 0 5px black;
}

</style>
</head>

<body>

<div id="map"></div>

<button id="menuButton">☰</button>

<div id="sidebar">

    <div class="title">GPS</div>

    <button class="action" id="gpsButton">
        現在地へ移動
    </button>

    <button class="action" id="followButton">
        GPS追従 ON
    </button>

    <button class="action" id="bearingModeButton">
        進行方向固定
    </button>

    <button class="action" id="viewModeButton">
        3D表示
    </button>

    <div class="title">ナビ</div>

    <input
    id="destinationInput"
    placeholder="緯度,経度"
    />

    <button class="action" id="routeButton">
        ルート開始
    </button>

    <button class="action" id="clearRouteButton">
        目的地＆ルート消去
    </button>

    <button class="action" id="modeButton">
        車モード
    </button>

    <button class="action" id="selectDestinationButton">
        地図タップ選択 OFF
    </button>

</div>

<div id="gpsInfo">
GPS取得中...
</div>

<script>

///////////////////////////////////////////////////////////////
// 地図
///////////////////////////////////////////////////////////////

const map=new maplibregl.Map({

    container:'map',

    style:{

        version:8,

        sources:{

            osm:{

                type:'raster',

                tiles:[
                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
                ],

                tileSize:256,

                attribution:'© OpenStreetMap'
            }
        },

        layers:[

            {

                id:'osm',

                type:'raster',

                source:'osm'
            }
        ]
    },

    center:[135.7681,35.0116],

    zoom:16,

    pitch:60
});

///////////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////////

const sidebar=
document.getElementById('sidebar');

document.getElementById(
'menuButton'
).onclick=()=>{

    sidebar.classList.toggle('open');
};

///////////////////////////////////////////////////////////////
// 状態
///////////////////////////////////////////////////////////////

let currentPosition=null;

let followMode=true;

let northUp=false;

let topView=false;

let navigationMode='driving';

let selectDestinationMode=false;

let destinationMarker=null;

///////////////////////////////////////////////////////////////
// ナビマーカー
///////////////////////////////////////////////////////////////

const navMarker=document.createElement('div');

navMarker.style.width='42px';
navMarker.style.height='42px';

navMarker.style.background=
'url(https://cdn-icons-png.flaticon.com/512/684/684908.png)';

navMarker.style.backgroundSize='contain';

navMarker.style.backgroundRepeat='no-repeat';

const userMarker=
new maplibregl.Marker({

    element:navMarker
});

///////////////////////////////////////////////////////////////
// 音声
///////////////////////////////////////////////////////////////

function speak(text){

    const utter=
    new SpeechSynthesisUtterance(text);

    utter.lang='ja-JP';

    speechSynthesis.speak(utter);
}

///////////////////////////////////////////////////////////////
// GPS
///////////////////////////////////////////////////////////////

function updateGPS(position){

    const lat=
    position.coords.latitude;

    const lng=
    position.coords.longitude;

    const heading=
    position.coords.heading || 0;

    currentPosition=[lng,lat];

    userMarker
    .setLngLat(currentPosition)
    .addTo(map);

    navMarker.style.transform=
    `rotate(${heading}deg)`;

    document.getElementById(
        'gpsInfo'
    ).innerText=

    `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    if(followMode){

        map.easeTo({

            center:currentPosition,

            zoom:map.getZoom(),

            pitch:
            topView
            ?
            0
            :
            60,

            bearing:
            northUp
            ?
            0
            :
            heading,

            duration:1000
        });
    }
}

///////////////////////////////////////////////////////////////
// GPS開始
///////////////////////////////////////////////////////////////

navigator.geolocation.watchPosition(

(position)=>{

    updateGPS(position);

},

(err)=>{

    console.log(err);

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
});

///////////////////////////////////////////////////////////////
// 目的地マーカー
///////////////////////////////////////////////////////////////

function setDestinationMarker(lng,lat){

    if(destinationMarker){

        destinationMarker.remove();
    }

    destinationMarker=
    new maplibregl.Marker({

        color:'#ff3333'
    })

    .setLngLat([lng,lat])

    .addTo(map);

    document.getElementById(
        'destinationInput'
    ).value=

    `${lat},${lng}`;
}

///////////////////////////////////////////////////////////////
// 地図タップ目的地
///////////////////////////////////////////////////////////////

map.on('click',(e)=>{

    if(!selectDestinationMode)return;

    const lng=e.lngLat.lng;
    const lat=e.lngLat.lat;

    setDestinationMarker(lng,lat);

    speak('目的地を設定しました');
});

///////////////////////////////////////////////////////////////
// ルート生成
///////////////////////////////////////////////////////////////

async function startRoute(){

    if(!currentPosition){

        alert('GPS取得中');
        return;
    }

    const input=
    document.getElementById(
        'destinationInput'
    ).value.trim();

    if(!input){

        alert('目的地未入力');
        return;
    }

    const split=input.split(',');

    if(split.length!==2){

        alert('緯度,経度');
        return;
    }

    const lat=
    parseFloat(split[0]);

    const lng=
    parseFloat(split[1]);

    if(isNaN(lat)||isNaN(lng)){

        alert('座標エラー');
        return;
    }

    setDestinationMarker(lng,lat);

    ///////////////////////////////////////////////////////////
    // 車/徒歩
    ///////////////////////////////////////////////////////////

    const profile=
    navigationMode==='walking'
    ?
    'foot'
    :
    'driving';

    ///////////////////////////////////////////////////////////
    // URL
    ///////////////////////////////////////////////////////////

    const url=
`https://router.project-osrm.org/route/v1/${profile}/${currentPosition[0]},${currentPosition[1]};${lng},${lat}?overview=full&geometries=geojson`;

    ///////////////////////////////////////////////////////////
    // API
    ///////////////////////////////////////////////////////////

    const res=
    await fetch(url);

    const data=
    await res.json();

    if(!data.routes||
       !data.routes.length){

        alert('ルート取得失敗');

        console.log(data);

        return;
    }

    ///////////////////////////////////////////////////////////
    // GeoJSON
    ///////////////////////////////////////////////////////////

    const routeGeoJSON={

        type:'Feature',

        geometry:
        data.routes[0].geometry
    };

    ///////////////////////////////////////////////////////////
    // 更新
    ///////////////////////////////////////////////////////////

    if(map.getSource('route-source')){

        map.getSource(
            'route-source'
        ).setData(routeGeoJSON);

    }else{

        map.addSource('route-source',{

            type:'geojson',

            data:routeGeoJSON
        });

        map.addLayer({

            id:'route-layer',

            type:'line',

            source:'route-source',

            layout:{

                'line-cap':'round',

                'line-join':'round'
            },

            paint:{

                'line-color':'#00aaff',

                'line-width':7
            }
        });
    }

    ///////////////////////////////////////////////////////////
    // 全体表示
    ///////////////////////////////////////////////////////////

    const bounds=
    new maplibregl.LngLatBounds();

    routeGeoJSON.geometry.coordinates
    .forEach(coord=>{

        bounds.extend(coord);
    });

    map.fitBounds(bounds,{

        padding:80
    });

    speak('ルート案内を開始します');
}

///////////////////////////////////////////////////////////////
// ルート消去
///////////////////////////////////////////////////////////////

function clearRoute(){

    if(map.getLayer('route-layer')){

        map.removeLayer('route-layer');
    }

    if(map.getSource('route-source')){

        map.removeSource('route-source');
    }

    if(destinationMarker){

        destinationMarker.remove();

        destinationMarker=null;
    }

    document.getElementById(
        'destinationInput'
    ).value='';

    speak('ルートを削除しました');
}

///////////////////////////////////////////////////////////////
// POI読み込み
///////////////////////////////////////////////////////////////

async function loadPOI(){

    const center=
    map.getCenter();

    const query=`

[out:json];

(

node["shop"="convenience"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

node["amenity"="fuel"]
(${center.lat-0.03},
${center.lng-0.03},
${center.lat+0.03},
${center.lng+0.03});

);

out;
`;

    const url=
    "https://overpass-api.de/api/interpreter?data="
    +
    encodeURIComponent(query);

    const res=
    await fetch(url);

    const data=
    await res.json();

    ///////////////////////////////////////////////////////////
    // 削除
    ///////////////////////////////////////////////////////////

    document
    .querySelectorAll('.poi-marker')
    .forEach(el=>el.remove());

    ///////////////////////////////////////////////////////////
    // 生成
    ///////////////////////////////////////////////////////////

    data.elements.forEach(el=>{

        const div=
        document.createElement('div');

        div.className='poi-marker';

        ///////////////////////////////////////////////////////
        // アイコン
        ///////////////////////////////////////////////////////

        if(el.tags.shop==='convenience'){

            div.innerHTML='🏪';

        }else if(el.tags.amenity==='fuel'){

            div.innerHTML='⛽';
        }

        div.style.fontSize='28px';

        div.style.cursor='pointer';

        ///////////////////////////////////////////////////////
        // マーカー
        ///////////////////////////////////////////////////////

        const marker=
        new maplibregl.Marker({

            element:div
        })

        .setLngLat([el.lon,el.lat])

        .addTo(map);

        ///////////////////////////////////////////////////////
        // タップ
        ///////////////////////////////////////////////////////

        div.onclick=()=>{

            const name=
            el.tags.name || '地点';

            const ok=
            confirm(
`${name}

目的地に設定しますか？`
            );

            if(!ok)return;

            setDestinationMarker(
                el.lon,
                el.lat
            );

            speak(
                '目的地を設定しました'
            );
        };
    });
}

///////////////////////////////////////////////////////////////
// 地図ロード
///////////////////////////////////////////////////////////////

map.on('load',()=>{

    loadPOI();

    ///////////////////////////////////////////////////////////
    // 移動時再取得
    ///////////////////////////////////////////////////////////

    map.on('moveend',()=>{

        loadPOI();
    });
});

///////////////////////////////////////////////////////////////
// ボタン
///////////////////////////////////////////////////////////////

document.getElementById(
'followButton'
).onclick=()=>{

    followMode=!followMode;

    document.getElementById(
    'followButton'
    ).innerText=

    followMode
    ?
    'GPS追従 ON'
    :
    'GPS追従 OFF';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'gpsButton'
).onclick=()=>{

    if(!currentPosition)return;

    map.flyTo({

        center:currentPosition,

        zoom:17
    });
};

///////////////////////////////////////////////////////////////

document.getElementById(
'bearingModeButton'
).onclick=()=>{

    northUp=!northUp;

    document.getElementById(
    'bearingModeButton'
    ).innerText=

    northUp
    ?
    '北固定'
    :
    '進行方向固定';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'viewModeButton'
).onclick=()=>{

    topView=!topView;

    map.easeTo({

        pitch:
        topView
        ?
        0
        :
        60
    });

    document.getElementById(
    'viewModeButton'
    ).innerText=

    topView
    ?
    '真上表示'
    :
    '3D表示';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'routeButton'
).onclick=()=>{

    startRoute();
};

///////////////////////////////////////////////////////////////

document.getElementById(
'clearRouteButton'
).onclick=()=>{

    clearRoute();
};

///////////////////////////////////////////////////////////////

document.getElementById(
'modeButton'
).onclick=()=>{

    navigationMode=

    navigationMode==='driving'
    ?
    'walking'
    :
    'driving';

    document.getElementById(
    'modeButton'
    ).innerText=

    navigationMode==='driving'
    ?
    '車モード'
    :
    '徒歩モード';
};

///////////////////////////////////////////////////////////////

document.getElementById(
'selectDestinationButton'
).onclick=()=>{

    selectDestinationMode=
    !selectDestinationMode;

    document.getElementById(
    'selectDestinationButton'
    ).innerText=

    selectDestinationMode
    ?
    '地図タップ選択 ON'
    :
    '地図タップ選択 OFF';
};

///////////////////////////////////////////////////////////////
// HTTPS
///////////////////////////////////////////////////////////////

if(location.protocol!=='https:'){

    alert(
`GPS利用にはHTTPSが必要です

GitHub Pages推奨`
    );
}

</script>

</body>
</html>
